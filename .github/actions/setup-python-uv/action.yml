name: Setup Python with uv
description: |
  astral-sh/setup-uv を使って uv をセットアップする Composite Action。
  checkout 後に呼び出す。

inputs:
  uv-version:
    description: setup-uv action のバージョン（action tag）
    required: false
    default: 'v8.1.0'

runs:
  using: composite
  steps:
    - uses: astral-sh/setup-uv@v8.1.0
