name: agent-session-manifest

# Trigger on push, pull_request, and merge_group only.
# Elevated-privilege trigger is intentionally excluded (no write permissions needed).
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  merge_group:

# Minimal read-only permissions — no write access, no secrets exposure.
permissions:
  contents: read

jobs:
  validate_generated_artifact:
    name: validate-generated-artifact
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '11.1.2'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate session manifest artifact
        run: |
          mkdir -p artifacts
          # Producer contract currently requires issue-<N>:<phase>:<seq>.
          # Derive a CI-run-specific 3-digit sequence from run identity.
          PHASE_SEQ=$(printf '%03d' $(( (10#${GITHUB_RUN_ID} + 10#${GITHUB_RUN_ATTEMPT}) % 1000 )))
          # Generate manifest via producer script.
          # Manifest JSON is written to artifacts/ only — NOT to stdout, log, or any public surface.
          node scripts/generate-session-manifest.mjs \
            --repository "${{ github.repository }}" \
            --phase-main-loop impl \
            --phase-ledger-phase post_commit_verification \
            --phase-instance-id "issue-432:impl:${PHASE_SEQ}" \
            --actor-type github_action \
            --actor-name session-manifest-workflow \
            --evidence-source-kind ci_check \
            --evidence-source-ref "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --evidence-visibility private_artifact \
            --format json \
            --validate \
            > artifacts/agent-session-manifest-ci.json
          # Verify file was written (no content in logs)
          test -s artifacts/agent-session-manifest-ci.json
          echo "Manifest artifact generated successfully."

      - name: Validate generated session manifest schema
        run: pnpm manifest:check artifacts/agent-session-manifest-ci.json

      - name: Verify artifact content is public-safe (belt-and-suspenders)
        run: |
          # Belt-and-suspenders supplementary check only.
          # The primary public-safe semantic validation is performed by pnpm manifest:check above.
          # This step checks known sensitive absolute-path prefixes and token patterns as defense-in-depth.
          # It does NOT claim to detect all absolute paths — for comprehensive rules see the manifest validator.
          # verification-anchor: FAIL token-like|token-like detected
          # verification-anchor: merge_group|merge queue
          FILE=artifacts/agent-session-manifest-ci.json
          if [ ! -f "$FILE" ]; then
            echo "FAIL: no artifact found for public-safe check"
            exit 1
          fi
          # Detect known sensitive absolute path prefixes (Unix and Windows)
          if grep -qE '"/(home|Users|tmp|var|private)/|[A-Za-z]:\\\\|file://' "$FILE"; then
            echo "FAIL: absolute path detected in manifest artifact — public-safe contract violated"
            exit 1
          fi
          echo "PASS: no known sensitive absolute path detected"
          if grep -qE '(gh[pousr]_[A-Za-z0-9_]{20,}|github_pat_[A-Za-z0-9_]{20,}|sk-[A-Za-z0-9]{20,}|[A-Fa-f0-9]{40,})' "$FILE"; then
            echo "FAIL: token-like string detected in manifest artifact"
            exit 1
          fi
          echo "PASS: no token-like string detected"
          if grep -qiE '"source_kind"[[:space:]]*:[[:space:]]*"(transcript|local_file)"|"raw_transcript_included"[[:space:]]*:[[:space:]]*true' "$FILE"; then
            echo "FAIL: transcript/local_file marker detected in manifest artifact"
            exit 1
          fi
          echo "PASS: no transcript/local_file marker detected"
          echo "PASS: belt-and-suspenders public-safe check complete"

      - name: Upload session manifest artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-session-manifest-${{ github.run_id }}
          path: artifacts/agent-session-manifest-ci.json
          if-no-files-found: error
          retention-days: 7
