name: Check Japanese Content

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created, edited]
  pull_request_review:
    types: [submitted, edited]
  pull_request_review_comment:
    types: [created, edited]

permissions:
  contents: read
  pull-requests: read
  issues: read

jobs:
  check-pr-body:
    name: PR Body Japanese Check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Check PR body Japanese ratio
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          echo "$PR_BODY" | python3 .claude/skills/create-issue/scripts/validate_japanese_content.py --threshold 0.1

      - name: Check changed Markdown files
        shell: bash
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail

          git fetch --no-tags --prune origin "+refs/heads/${BASE_REF}:refs/remotes/origin/${BASE_REF}"

          if ! MERGE_BASE="$(git merge-base "origin/${BASE_REF}" HEAD)"; then
            echo "ERROR: unable to compute merge-base for origin/${BASE_REF}...HEAD"
            echo "is_shallow=$(git rev-parse --is-shallow-repository)"
            exit 1
          fi

          tmp_changed="$(mktemp)"
          trap 'rm -f "$tmp_changed"' EXIT

          if ! git diff --name-only -z --diff-filter=ACMRT "$MERGE_BASE" HEAD -- '*.md' > "$tmp_changed"; then
            echo "ERROR: unable to compute changed Markdown diff for ${MERGE_BASE}..HEAD"
            echo "is_shallow=$(git rev-parse --is-shallow-repository)"
            exit 1
          fi

          CHANGED_MD=()
          while IFS= read -r -d '' file; do
            case "$file" in
              .venv/*|node_modules/*)
                continue
                ;;
            esac
            CHANGED_MD+=("$file")
          done < "$tmp_changed"

          if [ "${#CHANGED_MD[@]}" -eq 0 ]; then
            echo "No changed Markdown files to check."
            exit 0
          fi

          for file in "${CHANGED_MD[@]}"; do
            echo "Checking: $file"
            if ! python3 .claude/skills/create-issue/scripts/validate_japanese_content.py --file "$file" --threshold 0.1; then
              echo "FAIL: $file"
              exit 1
            fi
          done

  check-issue-body:
    name: Issue Body Japanese Check (retrospective)
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Check issue body Japanese ratio (retrospective)
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          echo "Retrospective check: issue body"
          if [ -z "$ISSUE_BODY" ]; then
            echo "No issue body to check."
            exit 0
          fi
          echo "$ISSUE_BODY" | python3 .claude/skills/create-issue/scripts/validate_japanese_content.py --threshold 0.1 || {
            echo "WARNING: Issue body has insufficient Japanese content (retrospective detection)."
            exit 0
          }

  check-issue-comment:
    name: Issue Comment Japanese Check (retrospective)
    if: github.event_name == 'issue_comment'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Check issue comment Japanese ratio (retrospective)
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          echo "Retrospective check: issue comment"
          echo "$COMMENT_BODY" | python3 .claude/skills/create-issue/scripts/validate_japanese_content.py --threshold 0.1 || {
            echo "WARNING: Issue comment has insufficient Japanese content (retrospective detection)."
            # retrospective detection のため fail-closed しない（警告のみ）
            exit 0
          }

  check-pr-review:
    name: PR Review Japanese Check (retrospective)
    if: github.event_name == 'pull_request_review' || github.event_name == 'pull_request_review_comment'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Check PR review body Japanese ratio (retrospective)
        env:
          REVIEW_BODY: ${{ github.event.review.body || github.event.comment.body || '' }}
        run: |
          echo "Retrospective check: PR review"
          if [ -z "$REVIEW_BODY" ]; then
            echo "No review body to check."
            exit 0
          fi
          echo "$REVIEW_BODY" | python3 .claude/skills/create-issue/scripts/validate_japanese_content.py --threshold 0.1 || {
            echo "WARNING: PR review has insufficient Japanese content (retrospective detection)."
            # retrospective detection のため fail-closed しない（警告のみ）
            exit 0
          }
