          GH_JOB: ${{ github.job }}
          GH_RUN_ID: ${{ github.run_id }}
          GH_RUN_ATTEMPT: ${{ github.run_attempt }}
          GH_SHA: ${{ github.sha }}
        run: |
          mkdir -p ci_runtime_baseline_artifacts
          python3 - <<'PY'
          import json, os, pathlib
          measurements = []
          p = pathlib.Path("measurements.jsonl")
          if p.exists():
              for line in p.read_text().splitlines():
                  line = line.strip()
                  if line:
                      r = json.loads(line)
                      r.update({
                          "run_id": os.environ["GH_RUN_ID"],
                          "run_attempt": os.environ["GH_RUN_ATTEMPT"],
                          "head_sha": os.environ.get("GH_HEAD_SHA", os.environ["GH_SHA"]),
                          "merge_sha": os.environ["GH_SHA"],
                          "job": os.environ["GH_JOB"],
                          "runner_image": os.environ.get("ImageOS","unknown") + "/" + os.environ.get("ImageVersion","unknown"),
                          "measurement_method": "date_plus3N_ms"
                      })
                      measurements.append(r)
          artifact = {
              "schema": "ci_runtime_baseline_v1",
              "run_id": os.environ["GH_RUN_ID"],
              "run_attempt": os.environ["GH_RUN_ATTEMPT"],
              "head_sha": os.environ.get("GH_HEAD_SHA", os.environ["GH_SHA"]),
              "merge_sha": os.environ["GH_SHA"],
              "job": os.environ["GH_JOB"],
              "runner_image": os.environ.get("ImageOS","unknown") + "/" + os.environ.get("ImageVersion","unknown"),
              "measurement_method": "date_plus3N_ms",
              "measurements": measurements,
          }
          out = pathlib.Path("ci_runtime_baseline_artifacts/ci_runtime_baseline_v1.json")
          out.write_text(json.dumps(artifact, indent=2))
          print(f"Written: {out}")
          PY
      - name: Upload ci-runtime-baseline artifact
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: ci-runtime-baseline-${{ github.job }}-${{ github.run_attempt }}
          path: ci_runtime_baseline_artifacts/
          if-no-files-found: warn
          retention-days: 30
      - name: Output CI runtime summary
        if: ${{ !cancelled() }}
        run: |
          {
            echo "## CI Runtime Baseline: ${{ github.job }}"
            echo ""
            echo "| step_id | elapsed_ms | status |"
            echo "|---|---|---|"
            python3 - <<'PY'
          import json, pathlib
          p = pathlib.Path("measurements.jsonl")
          if p.exists():
              for line in p.read_text().splitlines():
                  line = line.strip()
                  if line:
                      m = json.loads(line)
                      print(f"| {m['step_id']} | {m['elapsed_ms']} | {m['status']} |")
          PY
          } >> "$GITHUB_STEP_SUMMARY"

  ci-verdict-summary:
    runs-on: ubuntu-latest
    if: ${{ !cancelled() && github.event.inputs.python_test_bench != 'true' }}
    needs: [typecheck, lint, test, build, e2e, python-test, node-backed-hook-tests, actionlint]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Generate ci_verdict_summary_v2 artifact
        # B1: inline Python verdict calculation removed — ci_verdict_summary_v2.py called directly.
        # B2: --expected-head-sha uses github.event.pull_request.head.sha (not GITHUB_SHA).
        #     needs.result does not carry real head SHA, so provenance=needs_result_synthetic is set.
        env:
          NEEDS_JSON: >-
            {
              "typecheck": "${{ needs.typecheck.result }}",
              "lint": "${{ needs.lint.result }}",
              "test": "${{ needs.test.result }}",
              "build": "${{ needs.build.result }}",
              "e2e": "${{ needs.e2e.result }}",
              "python-test": "${{ needs.python-test.result }}",
              "node-backed-hook-tests": "${{ needs['node-backed-hook-tests'].result }}",
              "actionlint": "${{ needs.actionlint.result }}"
            }
        run: |
          mkdir -p ci_verdict_summary_v2_artifacts
          python3 .claude/skills/pr-review-judge/scripts/ci_verdict_summary_v2.py \
            --expected-head-sha "${{ github.event.pull_request.head.sha || github.sha }}" \
            --repository "${{ github.repository }}" \
            --workflow-run-id "${{ github.run_id }}" \
            --workflow-run-attempt "${{ github.run_attempt }}" \
            --event-name "${{ github.event_name }}" \
            --needs-json "${NEEDS_JSON}" \
            --output ci_verdict_summary_v2_artifacts/ci_verdict_summary_v2.json
      - name: Upload ci-verdict-summary-v2 artifact
        id: upload-ci-verdict-summary-v2
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: ci-verdict-summary-v2-${{ github.run_id }}-${{ github.run_attempt }}
          path: ci_verdict_summary_v2_artifacts/
          if-no-files-found: error
          retention-days: 30
      - name: Output ci_verdict_summary_v2 Step Summary
        # B4: artifact-id/url/digest passed to script so they appear in JSON and Step Summary.
        if: ${{ !cancelled() }}
        run: |
          python3 .claude/skills/pr-review-judge/scripts/ci_verdict_summary_v2.py \
            --expected-head-sha "${{ github.event.pull_request.head.sha || github.sha }}" \
            --repository "${{ github.repository }}" \
            --workflow-run-id "${{ github.run_id }}" \
            --workflow-run-attempt "${{ github.run_attempt }}" \
            --event-name "${{ github.event_name }}" \
            --needs-json "${NEEDS_JSON}" \
            --output ci_verdict_summary_v2_artifacts/ci_verdict_summary_v2.json \
            --artifact-id "${{ steps.upload-ci-verdict-summary-v2.outputs.artifact-id }}" \
            --artifact-url "${{ steps.upload-ci-verdict-summary-v2.outputs.artifact-url }}" \
            --artifact-digest "${{ steps.upload-ci-verdict-summary-v2.outputs.artifact-digest }}"
