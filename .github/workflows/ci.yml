name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v6
        with:
          version: 11
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v6
        with:
          version: 11
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v6
        with:
          version: 11
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm manifest:check
      - run: pnpm test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v6
        with:
          version: 11
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v6
        with:
          version: 11
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build for E2E
        run: VITE_E2E_MODE=true pnpm build
      - name: Install Playwright Chromium browser
        run: pnpm playwright:install:ci
      - name: Run E2E tests
        run: pnpm test:e2e:ci
      # Visual regression evidence pipeline — docs/dev/visual-baseline-registry.md §5
      # Upload on success AND failure (not just failure()) so baseline evidence is
      # always retained. Uses !cancelled() (not always()) — see registry §5 for rationale.
      - name: Upload Playwright report
        id: upload-playwright-report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: warn
          retention-days: 30
      - name: Upload test results
        id: upload-test-results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v6
        with:
          name: test-results
          path: test-results/
          if-no-files-found: warn
          retention-days: 30
      # Summary step MUST be after upload steps: outputs.artifact-url is only
      # available once upload-artifact has run, and $GITHUB_STEP_SUMMARY is
      # per-step (a later step cannot edit an earlier step's summary).
      - name: Summarize visual regression evidence
        if: ${{ !cancelled() }}
        env:
          PLAYWRIGHT_REPORT_URL: ${{ steps.upload-playwright-report.outputs.artifact-url || 'N/A' }}
          TEST_RESULTS_URL: ${{ steps.upload-test-results.outputs.artifact-url || 'N/A' }}
        run: |
          PW_VERSION="$(node -p "require('@playwright/test/package.json').version" 2>/dev/null || echo 'unknown')"
          {
            echo "## Visual regression evidence"
            echo ""
            echo "Visual baseline 契約は docs/dev/visual-baseline-registry.md を参照。"
            echo ""
            echo "### Environment fingerprint"
            echo "- runner: ${RUNNER_OS} ${RUNNER_ARCH} (image ${ImageOS:-unknown} ${ImageVersion:-unknown})"
            echo "- node: $(node -p 'process.version')"
            echo "- Playwright: ${PW_VERSION}"
            echo "- browser: chromium"
            echo "- project: chromium (Desktop Chrome)"
            echo "- viewport: 1280x720"
            echo "- deviceScaleFactor: 1 (Desktop Chrome default; not overridden)"
            echo "- snapshotPathTemplate: {testDir}/__screenshots__/{testFilePath}/{arg}{ext}"
            echo "- baseline path: tests/e2e/__screenshots__/m2-combat-mvp.spec.ts/"
            echo "- screenshot options: animations=disabled, maxDiffPixels=1"
            echo ""
            echo "### Artifacts"
            echo "- playwright-report: ${PLAYWRIGHT_REPORT_URL}"
            echo "- test-results: ${TEST_RESULTS_URL}"
            echo ""
            echo "### actual / expected / diff"
            if [ -d test-results ] && find test-results -name '*-diff.png' -print -quit | grep -q .; then
              echo "- visual mismatch detected: see *-actual.png / *-expected.png / *-diff.png in the test-results artifact above"
            else
              echo "- N/A (no visual mismatch; expected/actual/diff are only emitted on toHaveScreenshot failure)"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  python-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v6
        with:
          version: 11
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - uses: astral-sh/setup-uv@v8.1.0
      - run: uv python install
      - run: uv sync --locked --group dev
      - run: pnpm install --frozen-lockfile
      - name: Install ripgrep
        run: sudo apt-get install -y ripgrep
      - name: Verify Python version
        run: |
          uv run --locked python - <<'PY'
          import sys
          assert sys.version_info[:2] == (3, 12), sys.version
          print(sys.version)
          PY
      - run: uv run --locked python .claude/scripts/check_secret_policy.py docs/dev/secret-policy.md
      - run: uv run --locked python .claude/scripts/check_session_recording_policy.py docs/dev/session-recording-policy.md
      - name: Check InputCommand docs schema
        run: uv run --locked python scripts/check_input_command_schema.py
      - name: Check visual artifact pipeline wiring
        run: uv run --locked python scripts/check-visual-artifact-pipeline.py
      - run: uv run --locked pytest .claude/skills/gemini-cli-headless-delegation/tests/test_model_routing.py .claude/skills/edit-issue/tests/test_guard_issue_body.py .claude/skills/edit-issue/tests/test_issue_contract_hygiene_autofix.py
      - run: uv run --locked pytest .claude/skills/create-issue/tests/
      - run: uv run --locked pytest .claude/skills/create-issue/scripts/tests/
      - run: uv run --locked pytest .claude/skills/ssot-discovery/tests/test_match_ssot_registry.py -q
      - name: Run Claude hook tests
        run: uv run --locked pytest .claude/hooks/tests/ -q --ignore=.claude/hooks/tests/test_secret_boundary_contract.py
      - name: Verify hook test discovery exclusions
        run: |
          python3 - <<PY
          import subprocess
          from pathlib import Path

          # Tracked separately by Issue #412; remove this ignore once the test is CI-green.
          allowed_unregistered = {
              ".claude/hooks/tests/test_secret_boundary_contract.py",
          }
          expected = {
              hook_test.as_posix()
              for pattern in ("test_*.py", "*_test.py")
              for hook_test in Path(".claude/hooks/tests").rglob(pattern)
              if hook_test.as_posix() not in allowed_unregistered
          }

          result = subprocess.run(
              [
                  "uv",
                  "run",
                  "--locked",
                  "pytest",
                  "--collect-only",
                  "-q",
                  ".claude/hooks/tests/",
                  "--ignore=.claude/hooks/tests/test_secret_boundary_contract.py",
              ],
              capture_output=True,
              text=True,
              check=True,
          )

          collected = set()
          for line in result.stdout.splitlines():
              line = line.strip()
              if not line:
                  continue
              collected.add(line.split("::", 1)[0])

          missing = sorted(expected - collected)
          if missing:
              raise SystemExit("Hook tests missing from pytest discovery:\n" + "\n".join(missing))
          PY
      - run: uv run --locked pytest .claude/skills/issue-contract-review/scripts/tests/
      - run: uv run --locked pytest .claude/skills/issue-contract-review/tests/
      - run: uv run --locked pytest .claude/skills/pr-review-judge/scripts/tests/
      - run: uv run --locked pytest .claude/skills/open-pr/scripts/tests/
      - run: uv run --locked pytest .claude/skills/impl-review-loop/tests/ -q
      - run: uv run --locked pytest .claude/skills/review-issue/tests/ -q
      - run: uv run --locked pytest .claude/skills/issue-refinement-loop/tests/ -q
      - run: uv run --locked pytest schemas/tests/ -q
      - name: Kill Switch smoke test
        run: python3 .claude/scripts/kill_switch_runtime_smoke.py --fixtures tests/fixtures/session-recording
      - name: Secret exposure scan (production scripts)
        run: python3 .claude/scripts/secret_exposure_scanner.py --local .claude/scripts --exclude secret_exposure_scanner.py --exclude check_session_recording_runtime_safety.py --fail-on-finding
      - name: Secret exposure scan (clean fixtures)
        run: python3 .claude/scripts/secret_exposure_scanner.py --local tests/fixtures/session-recording/valid --fail-on-finding
      - name: Generate ci_test_selection/v1 artifact
        run: |
          mkdir -p ci_test_selection_artifacts
          uv run --locked pytest --collect-only -q \
            .claude/hooks/tests/ \
            --ignore=.claude/hooks/tests/test_secret_boundary_contract.py \
            > ci_test_selection_artifacts/hook_tests_collect_only.txt
          python3 .claude/skills/pr-review-judge/scripts/generate_ci_test_selection_artifact.py \
            --output ci_test_selection_artifacts/ci_test_selection_v1.json \
            --pytest-args \
              .claude/skills/gemini-cli-headless-delegation/tests/test_model_routing.py \
              .claude/skills/edit-issue/tests/test_guard_issue_body.py \
              .claude/skills/edit-issue/tests/test_issue_contract_hygiene_autofix.py \
              .claude/skills/create-issue/tests/ \
              .claude/skills/create-issue/scripts/tests/ \
              .claude/skills/ssot-discovery/tests/test_match_ssot_registry.py \
              .claude/hooks/tests/ \
              --ignore=.claude/hooks/tests/test_secret_boundary_contract.py \
              .claude/skills/issue-contract-review/scripts/tests/ \
              .claude/skills/issue-contract-review/tests/ \
              .claude/skills/pr-review-judge/scripts/tests/ \
              .claude/skills/open-pr/scripts/tests/ \
              .claude/skills/impl-review-loop/tests/ \
              .claude/skills/review-issue/tests/ \
              .claude/skills/issue-refinement-loop/tests/ \
            --pr-head-sha "${{ github.event.pull_request.head.sha || github.sha }}" \
            --merge-sha "${{ github.sha }}" \
            --workflow ci --job python-test \
            --ci-run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
      - uses: actions/upload-artifact@v6
        with:
          name: ci_test_selection
          path: ci_test_selection_artifacts/
          if-no-files-found: ignore

  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Install actionlint
        run: |
          curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/914e7df21a07ef503a81201c76d2b11c789d3fca/scripts/download-actionlint.bash | bash -s -- 1.7.12
          sudo mv actionlint /usr/local/bin/actionlint
      - name: Run actionlint
        run: actionlint
