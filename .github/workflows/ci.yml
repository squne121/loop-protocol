name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v6
        with:
          version: 11
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v6
        with:
          version: 11
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v6
        with:
          version: 11
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm manifest:check
      - run: pnpm test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v6
        with:
          version: 11
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v6
        with:
          version: 11
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build for E2E
        run: VITE_E2E_MODE=true pnpm build
      - name: Install Playwright Chromium browser
        run: pnpm playwright:install:ci
      - name: Run E2E tests
        run: pnpm test:e2e:ci
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 14
      - name: Upload test traces on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: test-results
          path: test-results/
          if-no-files-found: ignore
          retention-days: 14

  python-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@v8.1.0
      - run: uv python install
      - run: uv sync --locked --group dev
      - name: Install ripgrep
        run: sudo apt-get install -y ripgrep
      - name: Verify Python version
        run: |
          uv run --locked python - <<'PY'
          import sys
          assert sys.version_info[:2] == (3, 12), sys.version
          print(sys.version)
          PY
      - run: uv run --locked python .claude/scripts/check_secret_policy.py docs/dev/secret-policy.md
      - run: uv run --locked python .claude/scripts/check_session_recording_policy.py docs/dev/session-recording-policy.md
      - name: Check InputCommand docs schema
        run: uv run --locked python scripts/check_input_command_schema.py
      - run: uv run --locked pytest .claude/skills/gemini-cli-headless-delegation/tests/test_model_routing.py .claude/skills/edit-issue/tests/test_guard_issue_body.py .claude/skills/edit-issue/tests/test_issue_contract_hygiene_autofix.py
      - run: uv run --locked pytest .claude/skills/create-issue/tests/
      - run: uv run --locked pytest .claude/skills/create-issue/scripts/tests/
      - run: uv run --locked pytest .claude/skills/ssot-discovery/tests/test_match_ssot_registry.py -q
      - run: uv run --locked pytest .claude/hooks/tests/test_session_recording_policy_guard.py -q
      - run: uv run --locked pytest .claude/hooks/tests/test_guard_delta_mode.py -q
      - run: uv run --locked pytest .claude/hooks/tests/test_guard_shadow_mode.py -q
      - run: uv run --locked pytest .claude/hooks/tests/test_replay_scenarios.py -q
      - run: uv run --locked pytest .claude/hooks/tests/test_shadow_log.py -q
      - run: uv run --locked pytest .claude/skills/issue-contract-review/scripts/tests/
      - run: uv run --locked pytest .claude/skills/issue-contract-review/tests/
      - run: uv run --locked pytest .claude/skills/pr-review-judge/scripts/tests/
      - run: uv run --locked pytest .claude/skills/open-pr/scripts/tests/
      - run: uv run --locked pytest .claude/skills/impl-review-loop/tests/ -q
      - run: uv run --locked pytest .claude/skills/review-issue/tests/ -q
      - run: uv run --locked pytest .claude/skills/issue-refinement-loop/tests/ -q
      - run: uv run --locked pytest schemas/tests/ -q
      - name: Kill Switch smoke test
        run: python3 .claude/scripts/kill_switch_runtime_smoke.py --fixtures tests/fixtures/session-recording
      - name: Secret exposure scan (production scripts)
        run: python3 .claude/scripts/secret_exposure_scanner.py --local .claude/scripts --exclude secret_exposure_scanner.py --exclude check_session_recording_runtime_safety.py --fail-on-finding
      - name: Secret exposure scan (clean fixtures)
        run: python3 .claude/scripts/secret_exposure_scanner.py --local tests/fixtures/session-recording/valid --fail-on-finding
      - name: Generate ci_test_selection/v1 artifact
        run: |
          mkdir -p ci_test_selection_artifacts
          python3 .claude/skills/pr-review-judge/scripts/generate_ci_test_selection_artifact.py \
            --output ci_test_selection_artifacts/ci_test_selection_v1.json \
            --pytest-args \
              .claude/skills/gemini-cli-headless-delegation/tests/test_model_routing.py \
              .claude/skills/edit-issue/tests/test_guard_issue_body.py \
              .claude/skills/edit-issue/tests/test_issue_contract_hygiene_autofix.py \
              .claude/skills/create-issue/tests/ \
              .claude/skills/create-issue/scripts/tests/ \
              .claude/skills/ssot-discovery/tests/test_match_ssot_registry.py \
              .claude/hooks/tests/test_session_recording_policy_guard.py \
              .claude/hooks/tests/test_guard_delta_mode.py \
              .claude/hooks/tests/test_guard_shadow_mode.py \
              .claude/hooks/tests/test_replay_scenarios.py \
              .claude/hooks/tests/test_shadow_log.py \
              .claude/skills/issue-contract-review/scripts/tests/ \
              .claude/skills/issue-contract-review/tests/ \
              .claude/skills/pr-review-judge/scripts/tests/ \
              .claude/skills/open-pr/scripts/tests/ \
              .claude/skills/impl-review-loop/tests/ \
              .claude/skills/review-issue/tests/ \
              .claude/skills/issue-refinement-loop/tests/ \
            --pr-head-sha "${{ github.event.pull_request.head.sha || github.sha }}" \
            --merge-sha "${{ github.sha }}" \
            --workflow ci --job python-test \
            --ci-run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
      - uses: actions/upload-artifact@v6
        with:
          name: ci_test_selection
          path: ci_test_selection_artifacts/
          if-no-files-found: ignore

  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Install actionlint
        run: |
          curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/914e7df21a07ef503a81201c76d2b11c789d3fca/scripts/download-actionlint.bash | bash -s -- 1.7.12
          sudo mv actionlint /usr/local/bin/actionlint
      - name: Run actionlint
        run: actionlint
