  node-backed-hook-tests:
    if: ${{ github.event.inputs.python_test_bench != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          # fetch-depth: 0 so the ci_test_selection generator's explicit base..head git
          # diff resolves (Issue #1064 review: change detection is now fail-closed).
          fetch-depth: 0
      - uses: ./.github/actions/setup-node-pnpm
      - uses: ./.github/actions/setup-python-uv
      - name: uv python install (timed)
        id: timed-uv-python-install
        run: |
          run_timed() {
            local step_id="$1"; shift
            local start_ms end_ms elapsed_ms status
            start_ms=$(date +%s%3N)
            set +e
            "$@"
            status=$?
            set -e
            end_ms=$(date +%s%3N)
            elapsed_ms=$((end_ms - start_ms))
            printf '{"step_id":"%s","phase_id":"%s","status":%d,"elapsed_ms":%d}\n' \
              "$step_id" "$step_id" "$status" "$elapsed_ms" \
              >> measurements.jsonl
            return $status
          }
          run_timed uv_python_install uv python install
      - name: uv sync (timed)
        id: timed-uv-sync
        run: |
          run_timed() {
            local step_id="$1"; shift
            local start_ms end_ms elapsed_ms status
            start_ms=$(date +%s%3N)
            set +e
            "$@"
            status=$?
            set -e
            end_ms=$(date +%s%3N)
            elapsed_ms=$((end_ms - start_ms))
            printf '{"step_id":"%s","phase_id":"%s","status":%d,"elapsed_ms":%d}\n' \
              "$step_id" "$step_id" "$status" "$elapsed_ms" \
              >> measurements.jsonl
            return $status
          }
          run_timed uv_sync uv sync --locked --group dev
      - name: Install dependencies (timed)
        id: timed-pnpm-install
        run: |
          run_timed() {
            local step_id="$1"; shift
            local start_ms end_ms elapsed_ms status
            start_ms=$(date +%s%3N)
            set +e
            "$@"
            status=$?
            set -e
            end_ms=$(date +%s%3N)
            elapsed_ms=$((end_ms - start_ms))
            printf '{"step_id":"%s","phase_id":"%s","status":%d,"elapsed_ms":%d}\n' \
              "$step_id" "$step_id" "$status" "$elapsed_ms" \
              >> measurements.jsonl
            return $status
          }
          run_timed pnpm_install pnpm install --frozen-lockfile
      - name: pytest node-backed hook tests (timed)
        run: |
          _t0=$(date +%s%3N)
          set +e
          uv run --locked pytest -q \
            .claude/hooks/tests/test_generate_session_manifest_from_hook.py::test_wrapper_stdout_is_silent_and_artifact_path_is_overridable \
            .claude/hooks/tests/test_generate_session_manifest_from_hook.py::test_wrapper_stderr_redacts_posix_windows_and_wsl_paths
          _s=$?
          set -e
          printf '{"step_id":"pytest_node_backed_hook_tests","phase_id":"pytest_node_backed_hooks","status":%d,"elapsed_ms":%d}\n' \
            $_s $(($(date +%s%3N)-_t0)) >> measurements.jsonl
          exit $_s
      - name: Generate node-backed hook selection artifact
        run: |
          mkdir -p ci_test_selection_artifacts
          uv run --locked pytest --collect-only -q \
            .claude/hooks/tests/test_generate_session_manifest_from_hook.py::test_wrapper_stdout_is_silent_and_artifact_path_is_overridable \
            .claude/hooks/tests/test_generate_session_manifest_from_hook.py::test_wrapper_stderr_redacts_posix_windows_and_wsl_paths \
            > ci_test_selection_artifacts/node_backed_hook_tests_collect_only.txt
          uv run --locked pytest --collect-only -q \
            .claude/hooks/tests/ \
            --ignore=.claude/hooks/tests/test_secret_boundary_contract.py \
            --deselect=.claude/hooks/tests/test_generate_session_manifest_from_hook.py::test_wrapper_stdout_is_silent_and_artifact_path_is_overridable \
            --deselect=.claude/hooks/tests/test_generate_session_manifest_from_hook.py::test_wrapper_stderr_redacts_posix_windows_and_wsl_paths \
            > ci_test_selection_artifacts/python_hook_tests_collect_only.txt
          python3 - <<'PY'
          import argparse
          import importlib.util
          import json
          import pathlib
          import sys

          script_path = pathlib.Path(
              ".claude/skills/pr-review-judge/scripts/generate_ci_test_selection_artifact.py"
          )
          spec = importlib.util.spec_from_file_location(
              "generate_ci_test_selection_artifact", script_path
          )
          module = importlib.util.module_from_spec(spec)
          assert spec.loader is not None
          spec.loader.exec_module(module)

          args = argparse.Namespace(
              output="ci_test_selection_artifacts/ci_test_selection_v1.json",
              pytest_args=[
                  ".claude/hooks/tests/test_generate_session_manifest_from_hook.py::test_wrapper_stdout_is_silent_and_artifact_path_is_overridable",
                  ".claude/hooks/tests/test_generate_session_manifest_from_hook.py::test_wrapper_stderr_redacts_posix_windows_and_wsl_paths",
              ],
              plan=".github/ci/python-test-plan.json",
              pr_head_sha="${{ github.event.pull_request.head.sha || github.sha }}",
              base_sha="${{ github.event.pull_request.base.sha || github.event.before }}",
              head_sha="${{ github.event.pull_request.head.sha || github.sha }}",
              checked_out_sha=None,
              merge_sha="${{ github.sha }}",
              workflow="ci",
              job="node-backed-hook-tests",
              ci_run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
          )
          exit_code = module.generate_artifact(args)
          if exit_code != 0:
              sys.exit(exit_code)

          node_backed_nodeids = [
              ".claude/hooks/tests/test_generate_session_manifest_from_hook.py::test_wrapper_stdout_is_silent_and_artifact_path_is_overridable",
              ".claude/hooks/tests/test_generate_session_manifest_from_hook.py::test_wrapper_stderr_redacts_posix_windows_and_wsl_paths",
          ]
          artifact_dir = pathlib.Path("ci_test_selection_artifacts")
          python_lines = [
              line.strip()
              for line in (artifact_dir / "python_hook_tests_collect_only.txt").read_text().splitlines()
              if line.strip() and "::" in line
          ]
          node_lines = [
              line.strip()
              for line in (artifact_dir / "node_backed_hook_tests_collect_only.txt").read_text().splitlines()
              if line.strip() and "::" in line
          ]

          python_absent = sorted(nodeid for nodeid in node_backed_nodeids if nodeid not in python_lines)
          node_exact_match = sorted(node_lines) == sorted(node_backed_nodeids)
          overlap = sorted(set(python_lines) & set(node_lines))
          summary = {
              "schema": "ci_test_selection_summary_v1",
              "python_test": {
                  "collect_only_path": "ci_test_selection_artifacts/python_hook_tests_collect_only.txt",
                  "node_backed_nodeids_absent": len(python_absent) == len(node_backed_nodeids),
                  "absent_nodeids": python_absent,
                  "collected_count": len(python_lines),
              },
              "node_backed_hook_tests": {
                  "collect_only_path": "ci_test_selection_artifacts/node_backed_hook_tests_collect_only.txt",
                  "exact_nodeid_count": len(node_lines),
                  "exactly_expected_two": len(node_lines) == 2,
                  "matches_expected_nodeids": node_exact_match,
                  "collected_nodeids": node_lines,
              },
              "union_disjointness": {
                  "disjoint": not overlap,
                  "overlap_nodeids": overlap,
                  "union_count": len(set(python_lines) | set(node_lines)),
              },
          }
          out = artifact_dir / "ci_test_selection_summary_v1.json"
          out.write_text(json.dumps(summary, indent=2) + "\n")

          if not summary["python_test"]["node_backed_nodeids_absent"]:
              raise SystemExit("Node-backed nodeids still present in python-test collect-only output")
          if not summary["node_backed_hook_tests"]["exactly_expected_two"]:
              raise SystemExit("node-backed-hook-tests collect-only output did not contain exactly 2 nodeids")
          if not summary["node_backed_hook_tests"]["matches_expected_nodeids"]:
              raise SystemExit("node-backed-hook-tests collect-only output did not match expected nodeids")
          if not summary["union_disjointness"]["disjoint"]:
              raise SystemExit("python-test and node-backed-hook-tests collect-only outputs overlapped")
          PY
      - name: Verify node-backed ci_test_selection evidence files
        run: |
          test -s ci_test_selection_artifacts/node_backed_hook_tests_collect_only.txt
          test -s ci_test_selection_artifacts/python_hook_tests_collect_only.txt
