        run: |
          run_timed() {
            local step_id="$1"; shift
            local start_ms end_ms elapsed_ms status
            start_ms=$(date +%s%3N)
            set +e
            "$@"
            status=$?
            set -e
            end_ms=$(date +%s%3N)
            elapsed_ms=$((end_ms - start_ms))
            printf '{"step_id":"%s","phase_id":"%s","status":%d,"elapsed_ms":%d}\n' \
              "$step_id" "$step_id" "$status" "$elapsed_ms" \
              >> measurements.jsonl
            return $status
          }
          run_timed uv_python_install uv python install
      - name: uv sync (timed)
        id: timed-uv-sync
        run: |
          run_timed() {
            local step_id="$1"; shift
            local start_ms end_ms elapsed_ms status
