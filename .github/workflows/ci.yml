name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v6
        with:
          version: 11
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v6
        with:
          version: 11
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v6
        with:
          version: 11
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v6
        with:
          version: 11
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  python-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@v8.1.0
      - run: uv python install
      - run: uv sync --locked --group dev
      - name: Verify Python version
        run: |
          uv run --locked python - <<'PY'
          import sys
          assert sys.version_info[:2] == (3, 12), sys.version
          print(sys.version)
          PY
      - run: uv run --locked python .claude/scripts/check_secret_policy.py docs/dev/secret-policy.md
      - run: uv run --locked python .claude/scripts/check_session_recording_policy.py docs/dev/session-recording-policy.md
      - run: uv run --locked pytest .claude/skills/gemini-cli-headless-delegation/tests/test_model_routing.py .claude/skills/edit-issue/tests/test_guard_issue_body.py
      - run: uv run --locked pytest .claude/skills/create-issue/tests/
      - run: uv run --locked pytest .claude/skills/create-issue/scripts/tests/
      - run: uv run --locked pytest .claude/skills/ssot-discovery/tests/test_match_ssot_registry.py -q
      - run: uv run --locked pytest .claude/hooks/tests/test_session_recording_policy_guard.py -q
      - run: uv run --locked pytest .claude/skills/issue-contract-review/scripts/tests/
      - run: uv run --locked pytest .claude/skills/pr-review-judge/scripts/tests/
      - run: |
          mkdir -p ci_test_selection_artifacts
          python3 .claude/skills/pr-review-judge/scripts/generate_ci_test_selection_artifact.py --output ci_test_selection_artifacts/ci_test_selection_v1.json --head-sha "${{ github.sha }}" --workflow ci --job python-test
      - uses: actions/upload-artifact@v6
        with:
          name: ci_test_selection
          path: ci_test_selection_artifacts/
          if-no-files-found: ignore
