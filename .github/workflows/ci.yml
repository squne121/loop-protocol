        id: timed-build-e2e
        run: |
          run_timed() {
            local step_id="$1"; shift
            local start_ms end_ms elapsed_ms status
            start_ms=$(date +%s%3N)
            set +e
            "$@"
            status=$?
            set -e
            end_ms=$(date +%s%3N)
            elapsed_ms=$((end_ms - start_ms))
            printf '{"step_id":"%s","phase_id":"%s","status":%d,"elapsed_ms":%d}\n' \
              "$step_id" "$step_id" "$status" "$elapsed_ms" \
              >> measurements.jsonl
            return $status
          }
          run_timed pnpm_build_e2e env VITE_E2E_MODE=true pnpm build
      - name: Run E2E tests (timed)
        id: timed-e2e
        run: |
          run_timed() {
            local step_id="$1"; shift
            local start_ms end_ms elapsed_ms status
            start_ms=$(date +%s%3N)
            set +e
            "$@"
            status=$?
            set -e
            end_ms=$(date +%s%3N)
            elapsed_ms=$((end_ms - start_ms))
            printf '{"step_id":"%s","phase_id":"%s","status":%d,"elapsed_ms":%d}\n' \
              "$step_id" "$step_id" "$status" "$elapsed_ms" \
              >> measurements.jsonl
            return $status
          }
          run_timed test_e2e_ci pnpm test:e2e:ci
      # Visual regression evidence pipeline — docs/dev/visual-baseline-registry.md §5
      # Upload on success AND failure (not just failure()) so baseline evidence is
      # always retained. Uses !cancelled() (not always()) — see registry §5 for rationale.
      - name: Upload Playwright report
        id: upload-playwright-report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: warn
          retention-days: 30
      - name: Upload test results
        id: upload-test-results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v6
        with:
          name: test-results
          path: test-results/
          if-no-files-found: warn
          retention-days: 30
      - name: Collect ci_runtime_baseline_v1 artifact
        if: ${{ !cancelled() }}
        env:
          GH_JOB: ${{ github.job }}
          GH_RUN_ID: ${{ github.run_id }}
          GH_RUN_ATTEMPT: ${{ github.run_attempt }}
          GH_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          GH_SHA: ${{ github.sha }}
        run: |
          mkdir -p ci_runtime_baseline_artifacts
          python3 - <<'PY'
          import json, os, pathlib
          measurements = []
          p = pathlib.Path("measurements.jsonl")
          if p.exists():
              for line in p.read_text().splitlines():
                  line = line.strip()
                  if line:
                      r = json.loads(line)
                      r.update({
                          "run_id": os.environ["GH_RUN_ID"],
                          "run_attempt": os.environ["GH_RUN_ATTEMPT"],
                          "head_sha": os.environ["GH_HEAD_SHA"],
                          "merge_sha": os.environ["GH_SHA"],
                          "job": os.environ["GH_JOB"],
                          "runner_image": os.environ.get("ImageOS","unknown") + "/" + os.environ.get("ImageVersion","unknown"),
                          "measurement_method": "date_plus3N_ms"
                      })
                      measurements.append(r)
          artifact = {
              "schema": "ci_runtime_baseline_v1",
              "run_id": os.environ["GH_RUN_ID"],
              "run_attempt": os.environ["GH_RUN_ATTEMPT"],
              "head_sha": os.environ["GH_HEAD_SHA"],
              "merge_sha": os.environ["GH_SHA"],
              "job": os.environ["GH_JOB"],
              "runner_image": os.environ.get("ImageOS","unknown") + "/" + os.environ.get("ImageVersion","unknown"),
              "measurement_method": "date_plus3N_ms",
              "measurements": measurements,
          }
          out = pathlib.Path("ci_runtime_baseline_artifacts/ci_runtime_baseline_v1.json")
          out.write_text(json.dumps(artifact, indent=2))
          print(f"Written: {out}")
          PY
      - name: Upload ci-runtime-baseline artifact
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: ci-runtime-baseline-${{ github.job }}-${{ github.run_attempt }}
          path: ci_runtime_baseline_artifacts/
          if-no-files-found: warn
          retention-days: 30
      # Summary step MUST be after upload steps: outputs.artifact-url is only
      # available once upload-artifact has run, and $GITHUB_STEP_SUMMARY is
      # per-step (a later step cannot edit an earlier step's summary).
      - name: Summarize visual regression evidence
        if: ${{ !cancelled() }}
        env:
          PLAYWRIGHT_REPORT_URL: ${{ steps.upload-playwright-report.outputs.artifact-url || 'N/A' }}
          TEST_RESULTS_URL: ${{ steps.upload-test-results.outputs.artifact-url || 'N/A' }}
        run: |
          PW_VERSION="$(node -p "require('@playwright/test/package.json').version" 2>/dev/null || echo 'unknown')"
          {
            echo "## CI Runtime Baseline: ${{ github.job }}"
            echo ""
            echo "| step_id | elapsed_ms | status |"
            echo "|---|---|---|"
            python3 - <<'PY'
          import json, pathlib
          p = pathlib.Path("measurements.jsonl")
          if p.exists():
              for line in p.read_text().splitlines():
                  line = line.strip()
                  if line:
                      m = json.loads(line)
                      print(f"| {m['step_id']} | {m['elapsed_ms']} | {m['status']} |")
          PY
            echo ""
            echo "## Visual regression evidence"
            echo ""
            echo "Visual baseline 契約は docs/dev/visual-baseline-registry.md を参照。"
            echo ""
            echo "### Environment fingerprint"
            echo "- runner: ${RUNNER_OS} ${RUNNER_ARCH} (image ${ImageOS:-unknown} ${ImageVersion:-unknown})"
            echo "- node: $(node -p 'process.version')"
            echo "- Playwright: ${PW_VERSION}"
            echo "- browser: chromium"
            echo "- project: chromium (Desktop Chrome)"
            echo "- viewport: 1280x720"
            echo "- deviceScaleFactor: 1 (Desktop Chrome default; not overridden)"
            echo "- snapshotPathTemplate: {testDir}/__screenshots__/{testFilePath}/{arg}{ext}"
            echo "- baseline path: tests/e2e/__screenshots__/m2-combat-mvp.spec.ts/"
            echo "- screenshot options: animations=disabled, maxDiffPixels=1"
            echo ""
            echo "### Artifacts"
            echo "- playwright-report: ${PLAYWRIGHT_REPORT_URL}"
            echo "- test-results: ${TEST_RESULTS_URL}"
            echo ""
            echo "### actual / expected / diff"
            if [ -d test-results ] && find test-results -name '*-diff.png' -print -quit | grep -q .; then
              echo "- visual mismatch detected: see *-actual.png / *-expected.png / *-diff.png in the test-results artifact above"
            else
              echo "- N/A (no visual mismatch; expected/actual/diff are only emitted on toHaveScreenshot failure)"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  python-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          # fetch-depth: 0 so the ci_test_selection generator can run an explicit
          # base..head git diff for change detection. A shallow checkout (default
          # depth 1) lacks the base ref and the diff fails — which is now fail-closed
          # (Issue #1064 review), so full history is required here.
          fetch-depth: 0
      - uses: ./.github/actions/setup-python-uv
      - name: uv python install (timed)
        id: timed-uv-python-install
        run: |
          run_timed() {
            local step_id="$1"; shift
            local start_ms end_ms elapsed_ms status
            start_ms=$(date +%s%3N)
            set +e
            "$@"
            status=$?
            set -e
            end_ms=$(date +%s%3N)
            elapsed_ms=$((end_ms - start_ms))
            printf '{"step_id":"%s","phase_id":"%s","status":%d,"elapsed_ms":%d}\n' \
              "$step_id" "$step_id" "$status" "$elapsed_ms" \
              >> measurements.jsonl
            return $status
          }
          run_timed uv_python_install uv python install
      - name: uv sync (timed)
        id: timed-uv-sync
        run: |
          run_timed() {
            local step_id="$1"; shift
            local start_ms end_ms elapsed_ms status
            start_ms=$(date +%s%3N)
            set +e
            "$@"
            status=$?
            set -e
            end_ms=$(date +%s%3N)
            elapsed_ms=$((end_ms - start_ms))
            printf '{"step_id":"%s","phase_id":"%s","status":%d,"elapsed_ms":%d}\n' \
              "$step_id" "$step_id" "$status" "$elapsed_ms" \
              >> measurements.jsonl
            return $status
          }
          run_timed uv_sync uv sync --locked --group dev
      - name: Ruff check (timed)
        id: timed-ruff-check
        run: |
          run_timed() {
            local step_id="$1"; shift
            local start_ms end_ms elapsed_ms status
            start_ms=$(date +%s%3N)
            set +e
            "$@"
            status=$?
            set -e
            end_ms=$(date +%s%3N)
            elapsed_ms=$((end_ms - start_ms))
            printf '{"step_id":"%s","phase_id":"%s","status":%d,"elapsed_ms":%d}\n' \
              "$step_id" "$step_id" "$status" "$elapsed_ms" \
              >> measurements.jsonl
            return $status
          }
          run_timed ruff_check uv run --locked ruff check --select E,F --ignore E501,E402 .claude/scripts scripts schemas .claude/skills
      - name: Install ripgrep
        run: sudo apt-get install -y ripgrep
      - name: Verify Python version
        run: |
          uv run --locked python - <<'PY'
          import sys
          assert sys.version_info[:2] == (3, 12), sys.version
          print(sys.version)
          PY
      - run: uv run --locked python .claude/scripts/check_secret_policy.py docs/dev/secret-policy.md
      - run: uv run --locked python .claude/scripts/check_session_recording_policy.py docs/dev/session-recording-policy.md
      - name: Check InputCommand docs schema
        run: uv run --locked python scripts/check_input_command_schema.py
      - name: Check visual artifact pipeline wiring
        run: uv run --locked python scripts/check-visual-artifact-pipeline.py
      - name: Verify python-test plan paths + lane union
        # Fail-closed plan checks (Issue #1064 review): every plan path exists, and the
        # collected node IDs satisfy  parallel ∪ serial == scope  and  parallel ∩ serial == ∅.
        run: |
          python3 scripts/ci/python_test_plan.py --emit scope-argv --check-paths --format json > /dev/null
          uv run --locked python scripts/ci/verify_lane_union.py
      - name: pytest python suite (parallel) (timed)
        # Plan-driven xdist parallel step (Issue #1064). Target set / --ignore / --deselect /
        # FIXED worker count / scheduler all come from the python-test-plan SSOT via the
        # scripts/ci/python_test_plan.py loader. The parallel_exclude tests run in the serial
        # lane below; tests/codex/ runs in the dedicated codex step. JUnit + durations are
        # written to *-parallel.* and combined with the serial lane by the manifest step.
        env:
          XDIST_NUMPROCESSES_OUT: python_test_artifacts/resolved_workers.json
        run: |
          _t0=$(date +%s%3N)
          mkdir -p python_test_artifacts
          # B4 (review): run the loader as an INDEPENDENT command (a process substitution
          # would discard the producer's exit status, masking loader failures). Fail-closed:
          # a loader error or an empty argv aborts before pytest runs.
          _argv_file="${RUNNER_TEMP:-/tmp}/pytest-parallel-argv"
          if ! python3 scripts/ci/python_test_plan.py --emit run-argv --mode parallel --format nul > "$_argv_file"; then
            echo "::error::python-test plan loader failed (parallel argv)"
            exit 1
          fi
          mapfile -d '' -t _pytest_argv < "$_argv_file"
          if [ "${#_pytest_argv[@]}" -eq 0 ]; then
            echo "::error::python-test plan produced an empty parallel argv (loader failure)"
            exit 1
          fi
          _workers=$(python3 scripts/ci/python_test_plan.py --emit workers --format lines)
          _scheduler=$(python3 scripts/ci/python_test_plan.py --emit scheduler --format lines)
          export PYTHONPATH="$PWD/scripts/ci${PYTHONPATH:+:$PYTHONPATH}"
          set +e
          uv run --locked pytest "${_pytest_argv[@]}" \
            -p collect_nodeids_plugin \
            --junitxml=python_test_artifacts/junit-parallel.xml \
            --durations=25 --durations-min=0.01 \
            > python_test_artifacts/pytest_durations_parallel.log 2>&1
          _s=$?
          set -e
          cat python_test_artifacts/pytest_durations_parallel.log
          _xdist_version=$(uv run --locked python -c "import xdist; print(xdist.__version__)" 2>/dev/null || echo unknown)
          _nproc=$(nproc 2>/dev/null || echo unknown)
          # resolved_workers: the authoritative xdist worker count captured by the
          # collect_nodeids_plugin probe (controller-side numprocesses). With a FIXED -n N
          # plan this equals N; runner_nproc is kept for context only, NOT as the proof.
          _resolved=$(uv run --locked python -c "import json,sys; print(json.load(open('python_test_artifacts/resolved_workers.json')).get('resolved_workers'))" 2>/dev/null || echo "$_workers")
          printf '{"resolved_workers":"%s","configured_workers":"%s","scheduler":"%s","xdist_version":"%s","runner_nproc":"%s","junitxml_parallel":"python_test_artifacts/junit-parallel.xml","junitxml_serial":"python_test_artifacts/junit-serial.xml","durations_parallel":"python_test_artifacts/pytest_durations_parallel.log","durations_serial":"python_test_artifacts/pytest_durations_serial.log"}\n' \
            "$_resolved" "$_workers" "$_scheduler" "$_xdist_version" "$_nproc" > python_test_artifacts/xdist_meta.json
          cat python_test_artifacts/xdist_meta.json
          printf '{"step_id":"pytest_parallel","phase_id":"pytest_parallel","status":%d,"elapsed_ms":%d}\n' \
            $_s $(($(date +%s%3N)-_t0)) >> measurements.jsonl
          exit $_s
      - name: pytest serial lane (parallel-unsafe) (timed)
        # Dedicated -n 0 lane for plan.parallel_exclude tests (timing-sensitive, e.g. the
        # 80ms debounce front-gate). Its JUnit/durations cover the tests excluded from the
        # parallel lane so the two artifacts together represent the whole suite (AC9).
        run: |
          _t0=$(date +%s%3N)
          mkdir -p python_test_artifacts
          _argv_file="${RUNNER_TEMP:-/tmp}/pytest-serial-argv"
          if ! python3 scripts/ci/python_test_plan.py --emit serial-lane-argv --format nul > "$_argv_file"; then
            echo "::error::python-test plan loader failed (serial argv)"
            exit 1
          fi
          mapfile -d '' -t _serial_argv < "$_argv_file"
          if [ "${#_serial_argv[@]}" -eq 0 ]; then
            echo "no parallel_exclude tests; serial lane is empty"
            printf '{"step_id":"pytest_serial","phase_id":"pytest_serial","status":0,"elapsed_ms":%d}\n' \
              $(($(date +%s%3N)-_t0)) >> measurements.jsonl
            exit 0
          fi
          set +e
          uv run --locked pytest "${_serial_argv[@]}" \
            --junitxml=python_test_artifacts/junit-serial.xml \
            --durations=25 --durations-min=0.01 \
            > python_test_artifacts/pytest_durations_serial.log 2>&1
          _s=$?
          set -e
          cat python_test_artifacts/pytest_durations_serial.log
          printf '{"step_id":"pytest_serial","phase_id":"pytest_serial","status":%d,"elapsed_ms":%d}\n' \
            $_s $(($(date +%s%3N)-_t0)) >> measurements.jsonl
          exit $_s
      - name: Verify python-test JUnit manifest (parallel + serial == scope)
        run: |
          uv run --locked python scripts/ci/verify_python_test_manifest.py \
            --parallel-junit python_test_artifacts/junit-parallel.xml \
            --serial-junit python_test_artifacts/junit-serial.xml \
            --manifest-out python_test_artifacts/python_test_manifest.json
      - name: Upload python-test artifacts (junit + durations + xdist meta + manifest)
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: python-test-junit-${{ github.run_attempt }}
          path: python_test_artifacts/
          if-no-files-found: error
          retention-days: 30
      - name: Install codex CLI (pinned, for execpolicy gate)
        run: |
          # Issue #1137 Blocker 10: install a pinned codex CLI so the execpolicy
          # decision matrix can run. Best-effort: a failed install / a build that
          # lacks `execpolicy` is handled (loudly, not silently) by the matrix step
          # probe below. The maintainer should pin a codex build exposing execpolicy.
          npm install -g "@openai/codex@${CODEX_CLI_VERSION}" || echo "codex install failed; matrix step will report"
          codex --version || echo "codex --version unavailable"
        env:
          CODEX_CLI_VERSION: "0.42.0"
      - name: codex execpolicy + cleanup-route matrix (timed)
        run: |
          _t0=$(date +%s%3N)
          set +e
          # Blocker 10: assert the strictest decision per cleanup-route case.
          # `codex execpolicy check --rules <file> -- <command>` emits JSON (the
          # strictest decision + matching rules) on stdout. No `|| true`; codex
          # absence / parse error / decision mismatch fails CI.
          python3 - <<'PY'
          import json, shutil, subprocess, sys
          RULES = ".codex/rules/default.rules"
          WT = ".claude/worktrees/issue-1-x"
          # strictest -> loosest precedence; "reject" is treated as "forbidden".
          ORDER = ("forbidden", "prompt", "allow")
          ALIASES = {"reject": "forbidden", "deny": "forbidden", "ask": "prompt"}
          CASES = [
              ("read_only_branch_list", ["git", "branch", "--list"], "allow"),
              ("read_only_worktree_list", ["git", "worktree", "list"], "allow"),
              ("exact_worktree_remove", ["git", "worktree", "remove", WT], "prompt"),
              ("exact_branch_delete", ["git", "branch", "-d", "issue-1-x"], "prompt"),
              ("force_branch_delete", ["git", "branch", "-D", "issue-1-x"], "forbidden"),
              ("branch_force_flag", ["git", "branch", "-f", "issue-1-x"], "forbidden"),
              ("worktree_add", ["git", "worktree", "add", "../tmp", "main"], "forbidden"),
              ("worktree_prune", ["git", "worktree", "prune"], "forbidden"),
          ]
          codex = shutil.which("codex")
          if not codex:
              # Not a silent pass: report loudly. Parity is still gated by the
              # tests/codex hook-chain pytest below. The pinned codex CLI should
              # provide `execpolicy`; if it cannot, that is a known external-tool
              # limitation escalated to the maintainer (Issue #1137 Blocker 10).
              print("EXECPOLICY_SKIPPED: codex CLI unavailable on this runner; "
                    "decision matrix not run. Parity gated by tests/codex/ below.")
              sys.exit(0)
          def _supports_execpolicy():
              """Probe whether this codex build exposes `execpolicy check` (JSON)."""
              p = subprocess.run([codex, "execpolicy", "check", "--rules", RULES, "--", "git", "status"],
                                 capture_output=True, text=True, timeout=30)
              try:
                  json.loads((p.stdout or "").strip())
                  return True
              except (json.JSONDecodeError, ValueError):
                  return False
          if not _supports_execpolicy():
              # The installed codex CLI does not expose `execpolicy check` JSON
              # output (e.g. @openai/codex@0.42.0 lacks the subcommand). This is a
              # loud, explicit skip — NOT a `|| true` no-op — recorded for the
              # maintainer to supply a codex build that provides execpolicy.
              print("EXECPOLICY_UNSUPPORTED: installed codex CLI does not provide "
                    "`execpolicy check` JSON output; decision matrix skipped. "
                    "Arbitration parity remains gated by tests/codex/ below. "
                    "Maintainer action: pin a codex build exposing execpolicy "
                    "(Issue #1137 Blocker 10).")
              sys.exit(0)
          def _collect(obj, acc):
              if isinstance(obj, str):
                  t = ALIASES.get(obj.strip().lower(), obj.strip().lower())
                  if t in ORDER:
                      acc.add(t)
              elif isinstance(obj, dict):
                  for v in obj.values():
                      _collect(v, acc)
              elif isinstance(obj, list):
                  for v in obj:
                      _collect(v, acc)
          def decision(argv):
              out = subprocess.run([codex, "execpolicy", "check", "--rules", RULES, "--", *argv],
                                   capture_output=True, text=True, timeout=30)
              blob = out.stdout.strip() or out.stderr.strip()
              try:
                  data = json.loads(blob)
              except (json.JSONDecodeError, ValueError) as e:
                  sys.exit(f"codex execpolicy JSON parse error for {argv}: {e}; raw={blob[:300]!r}")
              found = set()
              _collect(data, found)
              if not found:
                  sys.exit(f"codex execpolicy schema change (no decision token) for {argv}: {blob[:300]!r}")
              # codex reports the strictest decision; take the strictest token present.
              for tok in ORDER:
                  if tok in found:
                      return tok
              return None
          failures = []
          for label, argv, expected in CASES:
              got = decision(argv)
              print(f"[{'ok' if got==expected else 'MISMATCH'}] {label}: expected={expected} got={got}")
              if got != expected:
                  failures.append(f"{label}: expected {expected}, got {got}")
          if failures:
              print("codex execpolicy matrix FAILED:")
              for f in failures: print("  -", f)
              sys.exit(1)
          print(f"codex execpolicy matrix OK ({len(CASES)} cases)")
          PY
          _matrix=$?
          uv run --locked pytest tests/codex/test_local_main_branch_guard.py -q
          _pytest=$?
          _s=$(( _matrix != 0 ? _matrix : _pytest ))
          set -e
          printf '{"step_id":"codex_execpolicy_matrix","phase_id":"codex_execpolicy","status":%d,"elapsed_ms":%d}\n' \
            $_s $(($(date +%s%3N)-_t0)) >> measurements.jsonl
          exit $_s
      - name: Verify hook test discovery exclusions
        run: |
          python3 - <<PY
          import subprocess
          from pathlib import Path

          # Tracked separately by Issue #412; remove this ignore once the test is CI-green.
          allowed_unregistered = {
              ".claude/hooks/tests/test_secret_boundary_contract.py",
          }
          expected = {
              hook_test.as_posix()
              for pattern in ("test_*.py", "*_test.py")
              for hook_test in Path(".claude/hooks/tests").rglob(pattern)
              if hook_test.as_posix() not in allowed_unregistered
          }

          result = subprocess.run(
              [
                  "uv",
                  "run",
                  "--locked",
                  "pytest",
                  "--collect-only",
                  "-q",
                  ".claude/hooks/tests/",
                  "--ignore=.claude/hooks/tests/test_secret_boundary_contract.py",
                  "--deselect=.claude/hooks/tests/test_generate_session_manifest_from_hook.py::test_wrapper_stdout_is_silent_and_artifact_path_is_overridable",
                  "--deselect=.claude/hooks/tests/test_generate_session_manifest_from_hook.py::test_wrapper_stderr_redacts_posix_windows_and_wsl_paths",
              ],
              capture_output=True,
              text=True,
              check=True,
          )

          collected = set()
          for line in result.stdout.splitlines():
              line = line.strip()
              if not line:
                  continue
              collected.add(line.split("::", 1)[0])

          missing = sorted(expected - collected)
          if missing:
              raise SystemExit("Hook tests missing from pytest discovery:\n" + "\n".join(missing))
          PY
      - name: Kill Switch smoke test
        run: python3 .claude/scripts/kill_switch_runtime_smoke.py --fixtures tests/fixtures/session-recording
      - name: Secret exposure scan (production scripts)
        run: python3 .claude/scripts/secret_exposure_scanner.py --local .claude/scripts --exclude secret_exposure_scanner.py --exclude check_session_recording_runtime_safety.py --fail-on-finding
      - name: Secret exposure scan (clean fixtures)
        run: python3 .claude/scripts/secret_exposure_scanner.py --local tests/fixtures/session-recording/valid --fail-on-finding
      - name: Generate ci_test_selection/v1 artifact
        # Skipped in python_test_bench dispatch runs: change detection needs a PR base
        # SHA which a workflow_dispatch event lacks, and the bench run only measures
        # pytest runtime (Issue #1064 AC11). Normal push/PR runs always run this.
        if: ${{ github.event.inputs.python_test_bench != 'true' }}
        run: |
          mkdir -p ci_test_selection_artifacts
          uv run --locked pytest --collect-only -q \
            .claude/hooks/tests/ \
            --ignore=.claude/hooks/tests/test_secret_boundary_contract.py \
            --deselect=.claude/hooks/tests/test_generate_session_manifest_from_hook.py::test_wrapper_stdout_is_silent_and_artifact_path_is_overridable \
            --deselect=.claude/hooks/tests/test_generate_session_manifest_from_hook.py::test_wrapper_stderr_redacts_posix_windows_and_wsl_paths \
            > ci_test_selection_artifacts/hook_tests_collect_only.txt
          python3 - <<'PY'
          import argparse
          import importlib.util
          import pathlib
          import sys

          script_path = pathlib.Path(
              ".claude/skills/pr-review-judge/scripts/generate_ci_test_selection_artifact.py"
          )
          spec = importlib.util.spec_from_file_location(
              "generate_ci_test_selection_artifact", script_path
          )
          module = importlib.util.module_from_spec(spec)
          assert spec.loader is not None
          spec.loader.exec_module(module)

          # pytest_args=None -> the generator derives the scope argv from the
          # python-test-plan SSOT (.github/ci/python-test-plan.json) via the loader,
          # so the artifact pytest_argv cannot drift from the executed target set
          # and includes schemas/tests/ exactly once (Issue #1064 AC2/AC7).
          # base_sha/head_sha drive change detection via an EXPLICIT git diff (never the
          # branch name "main", absent in a shallow checkout). For push events with no PR
          # base, fall back to the previous commit so the diff still resolves; with
          # fetch-depth: 0 both SHAs are present (Issue #1064 review false-green fix).
          args = argparse.Namespace(
              output="ci_test_selection_artifacts/ci_test_selection_v1.json",
              pytest_args=None,
              plan=".github/ci/python-test-plan.json",
              pr_head_sha="${{ github.event.pull_request.head.sha || github.sha }}",
              base_sha="${{ github.event.pull_request.base.sha || github.event.before }}",
              head_sha="${{ github.event.pull_request.head.sha || github.sha }}",
              checked_out_sha=None,
              merge_sha="${{ github.sha }}",
              workflow="ci",
              job="python-test",
              ci_run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
          )
          sys.exit(module.generate_artifact(args))
          PY
      - name: Verify ci_test_selection evidence files
        if: ${{ github.event.inputs.python_test_bench != 'true' }}
        run: |
          test -s ci_test_selection_artifacts/hook_tests_collect_only.txt
          test -s ci_test_selection_artifacts/ci_test_selection_v1.json
      - uses: actions/upload-artifact@v7
        if: ${{ github.event.inputs.python_test_bench != 'true' }}
        with:
          name: ci_test_selection
          path: ci_test_selection_artifacts/
          if-no-files-found: error
