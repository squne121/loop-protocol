        run: |
          mkdir -p ci_runtime_baseline_artifacts
          python3 - <<'PY'
          import json, os, pathlib
          measurements = []
          p = pathlib.Path("measurements.jsonl")
          if p.exists():
              for line in p.read_text().splitlines():
                  line = line.strip()
                  if line:
                      r = json.loads(line)
                      r.update({
                          "run_id": os.environ["GH_RUN_ID"],
                          "run_attempt": os.environ["GH_RUN_ATTEMPT"],
                          "head_sha": os.environ["GH_HEAD_SHA"],
                          "merge_sha": os.environ["GH_SHA"],
                          "job": os.environ["GH_JOB"],
                          "runner_image": os.environ.get("ImageOS","unknown") + "/" + os.environ.get("ImageVersion","unknown"),
                          "measurement_method": "date_plus3N_ms"
                      })
                      measurements.append(r)
          artifact = {
              "schema": "ci_runtime_baseline_v1",
              "run_id": os.environ["GH_RUN_ID"],
              "run_attempt": os.environ["GH_RUN_ATTEMPT"],
              "head_sha": os.environ["GH_HEAD_SHA"],
              "merge_sha": os.environ["GH_SHA"],
              "job": os.environ["GH_JOB"],
              "runner_image": os.environ.get("ImageOS","unknown") + "/" + os.environ.get("ImageVersion","unknown"),
              "measurement_method": "date_plus3N_ms",
              "measurements": measurements,
          }
          out = pathlib.Path("ci_runtime_baseline_artifacts/ci_runtime_baseline_v1.json")
          out.write_text(json.dumps(artifact, indent=2))
          print(f"Written: {out}")
          PY
      - name: Upload ci-runtime-baseline artifact
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: ci-runtime-baseline-${{ github.job }}-${{ github.run_attempt }}
          path: ci_runtime_baseline_artifacts/
          if-no-files-found: warn
          retention-days: 30
      # Summary step MUST be after upload steps: outputs.artifact-url is only
      # available once upload-artifact has run, and $GITHUB_STEP_SUMMARY is
      # per-step (a later step cannot edit an earlier step's summary).
      - name: Summarize visual regression evidence
        if: ${{ !cancelled() }}
        env:
          PLAYWRIGHT_REPORT_URL: ${{ steps.upload-playwright-report.outputs.artifact-url || 'N/A' }}
          TEST_RESULTS_URL: ${{ steps.upload-test-results.outputs.artifact-url || 'N/A' }}
        run: |
          PW_VERSION="$(node -p "require('@playwright/test/package.json').version" 2>/dev/null || echo 'unknown')"
          {
            echo "## CI Runtime Baseline: ${{ github.job }}"
            echo ""
            echo "| step_id | elapsed_ms | status |"
            echo "|---|---|---|"
            python3 - <<'PY'
          import json, pathlib
          p = pathlib.Path("measurements.jsonl")
          if p.exists():
              for line in p.read_text().splitlines():
                  line = line.strip()
                  if line:
                      m = json.loads(line)
                      print(f"| {m['step_id']} | {m['elapsed_ms']} | {m['status']} |")
          PY
            echo ""
            echo "## Visual regression evidence"
            echo ""
            echo "Visual baseline 契約は docs/dev/visual-baseline-registry.md を参照。"
            echo ""
            echo "### Environment fingerprint"
            echo "- runner: ${RUNNER_OS} ${RUNNER_ARCH} (image ${ImageOS:-unknown} ${ImageVersion:-unknown})"
            echo "- node: $(node -p 'process.version')"
            echo "- Playwright: ${PW_VERSION}"
            echo "- browser: chromium"
            echo "- project: chromium (Desktop Chrome)"
            echo "- viewport: 1280x720"
            echo "- deviceScaleFactor: 1 (Desktop Chrome default; not overridden)"
            echo "- snapshotPathTemplate: {testDir}/__screenshots__/{testFilePath}/{arg}{ext}"
            echo "- baseline path: tests/e2e/__screenshots__/m2-combat-mvp.spec.ts/"
            echo "- screenshot options: animations=disabled, maxDiffPixels=1"
            echo ""
            echo "### Artifacts"
            echo "- playwright-report: ${PLAYWRIGHT_REPORT_URL}"
            echo "- test-results: ${TEST_RESULTS_URL}"
            echo ""
            echo "### actual / expected / diff"
            if [ -d test-results ] && find test-results -name '*-diff.png' -print -quit | grep -q .; then
              echo "- visual mismatch detected: see *-actual.png / *-expected.png / *-diff.png in the test-results artifact above"
            else
              echo "- N/A (no visual mismatch; expected/actual/diff are only emitted on toHaveScreenshot failure)"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  python-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
