          GH_RUN_ATTEMPT: ${{ github.run_attempt }}
          GH_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          GH_SHA: ${{ github.sha }}
        run: |
          mkdir -p ci_runtime_baseline_artifacts
          python3 - <<'PY'
          import json, os, pathlib
          measurements = []
          p = pathlib.Path("measurements.jsonl")
          if p.exists():
              for line in p.read_text().splitlines():
                  line = line.strip()
                  if line:
                      r = json.loads(line)
                      r.update({
                          "run_id": os.environ["GH_RUN_ID"],
                          "run_attempt": os.environ["GH_RUN_ATTEMPT"],
                          "head_sha": os.environ["GH_HEAD_SHA"],
                          "merge_sha": os.environ["GH_SHA"],
                          "job": os.environ["GH_JOB"],
                          "runner_image": os.environ.get("ImageOS","unknown") + "/" + os.environ.get("ImageVersion","unknown"),
                          "measurement_method": "date_plus3N_ms"
                      })
                      measurements.append(r)
          artifact = {
              "schema": "ci_runtime_baseline_v1",
              "run_id": os.environ["GH_RUN_ID"],
              "run_attempt": os.environ["GH_RUN_ATTEMPT"],
              "head_sha": os.environ["GH_HEAD_SHA"],
              "merge_sha": os.environ["GH_SHA"],
              "job": os.environ["GH_JOB"],
              "runner_image": os.environ.get("ImageOS","unknown") + "/" + os.environ.get("ImageVersion","unknown"),
              "measurement_method": "date_plus3N_ms",
              "measurements": measurements,
          }
          out = pathlib.Path("ci_runtime_baseline_artifacts/ci_runtime_baseline_v1.json")
          out.write_text(json.dumps(artifact, indent=2))
          print(f"Written: {out}")
          PY
      - name: Upload ci-runtime-baseline artifact
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: ci-runtime-baseline-${{ github.job }}-${{ github.run_attempt }}
          path: ci_runtime_baseline_artifacts/
          if-no-files-found: warn
          retention-days: 30
      - name: Output CI runtime summary
        if: ${{ !cancelled() }}
        run: |
          {
            echo "## CI Runtime Baseline: ${{ github.job }}"
            echo ""
            echo "| step_id | elapsed_ms | status |"
            echo "|---|---|---|"
            python3 - <<'PY'
          import json, pathlib
          p = pathlib.Path("measurements.jsonl")
          if p.exists():
              for line in p.read_text().splitlines():
                  line = line.strip()
                  if line:
                      m = json.loads(line)
                      print(f"| {m['step_id']} | {m['elapsed_ms']} | {m['status']} |")
          PY
          } >> "$GITHUB_STEP_SUMMARY"

  node-backed-hook-tests:
    if: ${{ github.event.inputs.python_test_bench != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          # fetch-depth: 0 so the ci_test_selection generator's explicit base..head git
          # diff resolves (Issue #1064 review: change detection is now fail-closed).
          fetch-depth: 0
      - uses: ./.github/actions/setup-node-pnpm
      - uses: ./.github/actions/setup-python-uv
      - name: uv python install (timed)
        id: timed-uv-python-install
        run: |
          run_timed() {
            local step_id="$1"; shift
            local start_ms end_ms elapsed_ms status
            start_ms=$(date +%s%3N)
            set +e
            "$@"
            status=$?
            set -e
            end_ms=$(date +%s%3N)
            elapsed_ms=$((end_ms - start_ms))
            printf '{"step_id":"%s","phase_id":"%s","status":%d,"elapsed_ms":%d}\n' \
              "$step_id" "$step_id" "$status" "$elapsed_ms" \
              >> measurements.jsonl
            return $status
          }
          run_timed uv_python_install uv python install
      - name: uv sync (timed)
        id: timed-uv-sync
        run: |
          run_timed() {
            local step_id="$1"; shift
            local start_ms end_ms elapsed_ms status
            start_ms=$(date +%s%3N)
            set +e
            "$@"
            status=$?
            set -e
            end_ms=$(date +%s%3N)
            elapsed_ms=$((end_ms - start_ms))
            printf '{"step_id":"%s","phase_id":"%s","status":%d,"elapsed_ms":%d}\n' \
              "$step_id" "$step_id" "$status" "$elapsed_ms" \
              >> measurements.jsonl
            return $status
          }
          run_timed uv_sync uv sync --locked --group dev
      - name: Install dependencies (timed)
        id: timed-pnpm-install
        run: |
          run_timed() {
            local step_id="$1"; shift
            local start_ms end_ms elapsed_ms status
            start_ms=$(date +%s%3N)
            set +e
            "$@"
            status=$?
            set -e
            end_ms=$(date +%s%3N)
            elapsed_ms=$((end_ms - start_ms))
            printf '{"step_id":"%s","phase_id":"%s","status":%d,"elapsed_ms":%d}\n' \
              "$step_id" "$step_id" "$status" "$elapsed_ms" \
              >> measurements.jsonl
            return $status
          }
          run_timed pnpm_install pnpm install --frozen-lockfile
      - name: pytest node-backed hook tests (timed)
        run: |
          _t0=$(date +%s%3N)
          set +e
          uv run --locked pytest -q \
            .claude/hooks/tests/test_generate_session_manifest_from_hook.py::test_wrapper_stdout_is_silent_and_artifact_path_is_overridable \
            .claude/hooks/tests/test_generate_session_manifest_from_hook.py::test_wrapper_stderr_redacts_posix_windows_and_wsl_paths
          _s=$?
          set -e
          printf '{"step_id":"pytest_node_backed_hook_tests","phase_id":"pytest_node_backed_hooks","status":%d,"elapsed_ms":%d}\n' \
            $_s $(($(date +%s%3N)-_t0)) >> measurements.jsonl
          exit $_s
      - name: pytest_session_recording_codex_hook_adapter (timed)
        # Issue #1420 fix_delta 2: dedicated node-backed-hook-tests lane for
        # tests/session_recording/codex/test_hook_adapter.py. This job already
        # runs pnpm install, so the Node child-process dependency
        # (codex-hook-adapter.mjs / ajv / ajv-formats) is available here.
        # Independent of the fixed 2-nodeid disjointness/exact-match invariant
        # check below (do not touch that block).
        run: |
          _t0=$(date +%s%3N)
          set +e
          uv run --locked pytest -q tests/session_recording/codex/test_hook_adapter.py -p no:xdist
          _s=$?
          set -e
          printf '{"step_id":"pytest_session_recording_codex_hook_adapter","phase_id":"pytest_session_recording_codex_hook_adapter","status":%d,"elapsed_ms":%d}\n' \
            $_s $(($(date +%s%3N)-_t0)) >> measurements.jsonl
          exit $_s
      - name: pytest_session_recording_codex_initial_branch_create_lane (timed)
        # Issue #1449 fix_delta (PR #1479 review): dedicated node-backed-hook-tests
        # lane for tests/session_recording/codex/test_initial_branch_create_lane.py,
        # which exercises the real codex-hook-adapter.mjs node subprocess (same
        # harness pattern as test_hook_adapter.py above) and was previously an
        # uncovered changed test file (neither python-test targets nor this job's
        # dedicated_lanes referenced it).
        run: |
          _t0=$(date +%s%3N)
          set +e
          uv run --locked pytest -q tests/session_recording/codex/test_initial_branch_create_lane.py -p no:xdist
          _s=$?
          set -e
          printf '{"step_id":"pytest_session_recording_codex_initial_branch_create_lane","phase_id":"pytest_session_recording_codex_initial_branch_create_lane","status":%d,"elapsed_ms":%d}\n' \
            $_s $(($(date +%s%3N)-_t0)) >> measurements.jsonl
          exit $_s
      - name: pytest_session_recording_codex_hook_adapter_xdist (timed)
        # Issue #1420 fix_delta 3 AC11: run the same suite under pytest-xdist
        # parallel execution (-n 4 --dist load) to regression-test the manifest
        # write-path race fix under real worker parallelism. The `-p no:xdist`
        # step above is left untouched (both lanes execute).
        run: |
          _t0=$(date +%s%3N)
          set +e
          uv run --locked pytest -q tests/session_recording/codex/test_hook_adapter.py -n 4 --dist load
          _s=$?
          set -e
          printf '{"step_id":"pytest_session_recording_codex_hook_adapter_xdist","phase_id":"pytest_session_recording_codex_hook_adapter_xdist","status":%d,"elapsed_ms":%d}\n' \
            $_s $(($(date +%s%3N)-_t0)) >> measurements.jsonl
          exit $_s
      - name: node --test session_manifest_debounce (AC4/AC6, Node 22) (timed)
        # Issue #1141 AC6: virtual-clock unit tests for flushLoop DI core.
        # Node 22 is guaranteed by the setup-node-pnpm composite action (default
        # node-version: '22'). This step runs in the node-backed-hook-tests job
        # so it has both Node and Python/uv available.
        run: |
          _t0=$(date +%s%3N)
          set +e
          node --test .claude/hooks/tests/test_session_manifest_debounce.mjs
          _s=$?
          set -e
          printf '{"step_id":"node_test_debounce_ac4","phase_id":"node_test_debounce","status":%d,"elapsed_ms":%d}\n' \
            $_s $(($(date +%s%3N)-_t0)) >> measurements.jsonl
          exit $_s
      - name: Generate node-backed hook selection artifact
        run: |
          mkdir -p ci_test_selection_artifacts
          uv run --locked pytest --collect-only -q \
            .claude/hooks/tests/test_generate_session_manifest_from_hook.py::test_wrapper_stdout_is_silent_and_artifact_path_is_overridable \
            .claude/hooks/tests/test_generate_session_manifest_from_hook.py::test_wrapper_stderr_redacts_posix_windows_and_wsl_paths \
            tests/session_recording/codex/test_hook_adapter.py \
            tests/session_recording/codex/test_initial_branch_create_lane.py \
            > ci_test_selection_artifacts/node_backed_hook_tests_collect_only.txt
          uv run --locked pytest --collect-only -q \
            .claude/hooks/tests/ \
            --ignore=.claude/hooks/tests/test_secret_boundary_contract.py \
            --deselect=.claude/hooks/tests/test_generate_session_manifest_from_hook.py::test_wrapper_stdout_is_silent_and_artifact_path_is_overridable \
            --deselect=.claude/hooks/tests/test_generate_session_manifest_from_hook.py::test_wrapper_stderr_redacts_posix_windows_and_wsl_paths \
            > ci_test_selection_artifacts/python_hook_tests_collect_only.txt
          python3 - <<'PY'
          import argparse
          import importlib.util
          import json
          import pathlib
          import sys

          script_path = pathlib.Path(
              ".claude/skills/pr-review-judge/scripts/generate_ci_test_selection_artifact.py"
          )
          spec = importlib.util.spec_from_file_location(
              "generate_ci_test_selection_artifact", script_path
          )
          module = importlib.util.module_from_spec(spec)
          assert spec.loader is not None
          spec.loader.exec_module(module)

          args = argparse.Namespace(
              output="ci_test_selection_artifacts/ci_test_selection_v1.json",
              pytest_args=[
                  ".claude/hooks/tests/test_generate_session_manifest_from_hook.py::test_wrapper_stdout_is_silent_and_artifact_path_is_overridable",
                  ".claude/hooks/tests/test_generate_session_manifest_from_hook.py::test_wrapper_stderr_redacts_posix_windows_and_wsl_paths",
                  "tests/session_recording/codex/test_hook_adapter.py",
                  "tests/session_recording/codex/test_initial_branch_create_lane.py",
              ],
              plan=".github/ci/python-test-plan.json",
              pr_head_sha="${{ github.event.pull_request.head.sha || github.sha }}",
              base_sha="${{ github.event.pull_request.base.sha || github.event.before }}",
              head_sha="${{ github.event.pull_request.head.sha || github.sha }}",
              checked_out_sha=None,
              merge_sha="${{ github.sha }}",
              workflow="ci",
              job="node-backed-hook-tests",
              ci_run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
          )
          exit_code = module.generate_artifact(args)
          if exit_code != 0:
              sys.exit(exit_code)

          # Fixed 2-nodeid sublane (Node child-process hook wrapper tests, #1064).
          # This invariant is unchanged and independent of the collect-only
          # extension below (Issue #1420 fix_delta AC8).
          node_backed_nodeids = [
              ".claude/hooks/tests/test_generate_session_manifest_from_hook.py::test_wrapper_stdout_is_silent_and_artifact_path_is_overridable",
              ".claude/hooks/tests/test_generate_session_manifest_from_hook.py::test_wrapper_stderr_redacts_posix_windows_and_wsl_paths",
          ]
          # #1420 fix_delta AC8: the session_recording sublane is now ALSO
          # collected in this same collect-only pass so the G1
          # uncovered_changed_test_files gate observes real execution evidence
          # for tests/session_recording/codex/test_hook_adapter.py instead of
          # relying solely on the python-test-plan.json declared
          # secondary_coverage entry.
          # #1449 fix_delta (PR #1479 review): tests/session_recording/codex/
          # test_initial_branch_create_lane.py joins the same sublane (same
          # directory, same real codex-hook-adapter.mjs node subprocess
          # harness) so it is also treated as session_recording, not as a
          # "fixed hook wrapper" nodeid.
          session_recording_prefixes = (
              "tests/session_recording/codex/test_hook_adapter.py",
              "tests/session_recording/codex/test_initial_branch_create_lane.py",
          )
          artifact_dir = pathlib.Path("ci_test_selection_artifacts")
          python_lines = [
              line.strip()
              for line in (artifact_dir / "python_hook_tests_collect_only.txt").read_text().splitlines()
              if line.strip() and "::" in line
          ]
          node_lines = [
              line.strip()
              for line in (artifact_dir / "node_backed_hook_tests_collect_only.txt").read_text().splitlines()
              if line.strip() and "::" in line
          ]
          session_recording_nodeids = sorted(
              line for line in node_lines if line.startswith(session_recording_prefixes)
          )
          fixed_hook_wrapper_nodeids = sorted(
              line for line in node_lines if not line.startswith(session_recording_prefixes)
          )

          python_absent = sorted(nodeid for nodeid in node_backed_nodeids if nodeid not in python_lines)
          node_exact_match = fixed_hook_wrapper_nodeids == sorted(node_backed_nodeids)
          overlap = sorted(set(python_lines) & set(node_lines))
          summary = {
              "schema": "ci_test_selection_summary_v1",
              "python_test": {
                  "collect_only_path": "ci_test_selection_artifacts/python_hook_tests_collect_only.txt",
                  "node_backed_nodeids_absent": len(python_absent) == len(node_backed_nodeids),
                  "absent_nodeids": python_absent,
                  "collected_count": len(python_lines),
              },
              "node_backed_hook_tests": {
                  "collect_only_path": "ci_test_selection_artifacts/node_backed_hook_tests_collect_only.txt",
                  "exact_nodeid_count": len(node_lines),
                  "exactly_expected_two": len(fixed_hook_wrapper_nodeids) == 2,
                  "matches_expected_nodeids": node_exact_match,
                  "collected_nodeids": node_lines,
                  "session_recording_nodeids_count": len(session_recording_nodeids),
                  "session_recording_nodeids_present": len(session_recording_nodeids) > 0,
              },
              "union_disjointness": {
                  "disjoint": not overlap,
                  "overlap_nodeids": overlap,
                  "union_count": len(set(python_lines) | set(node_lines)),
              },
          }
          out = artifact_dir / "ci_test_selection_summary_v1.json"
          out.write_text(json.dumps(summary, indent=2) + "\n")

          if not summary["python_test"]["node_backed_nodeids_absent"]:
              raise SystemExit("Node-backed nodeids still present in python-test collect-only output")
          if not summary["node_backed_hook_tests"]["exactly_expected_two"]:
              raise SystemExit("node-backed-hook-tests collect-only output did not contain exactly 2 fixed nodeids")
          if not summary["node_backed_hook_tests"]["matches_expected_nodeids"]:
              raise SystemExit("node-backed-hook-tests collect-only output did not match expected fixed nodeids")
          if not summary["node_backed_hook_tests"]["session_recording_nodeids_present"]:
              raise SystemExit("node-backed-hook-tests collect-only output did not include tests/session_recording/codex/test_hook_adapter.py nodeids")
          if not summary["union_disjointness"]["disjoint"]:
              raise SystemExit("python-test and node-backed-hook-tests collect-only outputs overlapped")
          PY
      - name: Verify node-backed ci_test_selection evidence files
        run: |
          test -s ci_test_selection_artifacts/node_backed_hook_tests_collect_only.txt
          test -s ci_test_selection_artifacts/python_hook_tests_collect_only.txt
          test -s ci_test_selection_artifacts/ci_test_selection_v1.json
