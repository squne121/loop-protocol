            elapsed_ms=$((end_ms - start_ms))
            printf '{"step_id":"%s","phase_id":"%s","status":%d,"elapsed_ms":%d}\n' \
              "$step_id" "$step_id" "$status" "$elapsed_ms" \
              >> measurements.jsonl
            return $status
          }
          run_timed test_e2e_ci pnpm test:e2e:ci
      # Visual regression evidence pipeline — docs/dev/visual-baseline-registry.md §5
      # Upload on success AND failure (not just failure()) so baseline evidence is
      # always retained. Uses !cancelled() (not always()) — see registry §5 for rationale.
      - name: Upload Playwright report
        id: upload-playwright-report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: warn
          retention-days: 30
      - name: Upload test results
        id: upload-test-results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v6
        with:
          name: test-results
          path: test-results/
          if-no-files-found: warn
          retention-days: 30
