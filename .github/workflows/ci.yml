name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      python_test_bench:
        description: >-
          When true, run ONLY the python-test job (skip every other job). Used to
          collect runner-identical base/head python-test runtime samples (Issue #1064
          AC11) without paying for the unrelated jobs on each measurement run.
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  # For push / pull_request: one shared group per ref with cancel-in-progress (normal
  # behaviour). For workflow_dispatch: a UNIQUE group per run (github.run_id) so the
  # 20 dispatched benchmark runs on the same ref do NOT cancel each other (Issue #1064
  # AC11 runner-identical sampling).
  group: ci-${{ github.workflow }}-${{ github.ref }}-${{ github.event_name == 'workflow_dispatch' && github.run_id || 'shared' }}
  cancel-in-progress: true

jobs:
  typecheck:
    if: ${{ github.event.inputs.python_test_bench != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-node-pnpm
      - name: Install dependencies (timed)
        id: timed-pnpm-install
        run: |
          run_timed() {
            local step_id="$1"; shift
            local start_ms end_ms elapsed_ms status
            start_ms=$(date +%s%3N)
            set +e
            "$@"
            status=$?
            set -e
            end_ms=$(date +%s%3N)
            elapsed_ms=$((end_ms - start_ms))
            printf '{"step_id":"%s","phase_id":"%s","status":%d,"elapsed_ms":%d}\n' \
              "$step_id" "$step_id" "$status" "$elapsed_ms" \
              >> measurements.jsonl
            return $status
          }
          run_timed pnpm_install pnpm install --frozen-lockfile
      - name: Typecheck (timed)
        id: timed-typecheck
        run: |
          run_timed() {
            local step_id="$1"; shift
            local start_ms end_ms elapsed_ms status
            start_ms=$(date +%s%3N)
            set +e
            "$@"
            status=$?
            set -e
            end_ms=$(date +%s%3N)
            elapsed_ms=$((end_ms - start_ms))
            printf '{"step_id":"%s","phase_id":"%s","status":%d,"elapsed_ms":%d}\n' \
              "$step_id" "$step_id" "$status" "$elapsed_ms" \
              >> measurements.jsonl
            return $status
          }
          run_timed pnpm_typecheck pnpm typecheck
      - name: Collect ci_runtime_baseline_v1 artifact
        if: ${{ !cancelled() }}
        env:
          GH_JOB: ${{ github.job }}
          GH_RUN_ID: ${{ github.run_id }}
          GH_RUN_ATTEMPT: ${{ github.run_attempt }}
          GH_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          GH_SHA: ${{ github.sha }}
        run: |
          mkdir -p ci_runtime_baseline_artifacts
          python3 - <<'PY'
          import json, os, pathlib
          measurements = []
          p = pathlib.Path("measurements.jsonl")
          if p.exists():
              for line in p.read_text().splitlines():
                  line = line.strip()
                  if line:
                      r = json.loads(line)
                      r.update({
                          "run_id": os.environ["GH_RUN_ID"],
                          "run_attempt": os.environ["GH_RUN_ATTEMPT"],
                          "head_sha": os.environ["GH_HEAD_SHA"],
                          "merge_sha": os.environ["GH_SHA"],
                          "job": os.environ["GH_JOB"],
                          "runner_image": os.environ.get("ImageOS","unknown") + "/" + os.environ.get("ImageVersion","unknown"),
                          "measurement_method": "date_plus3N_ms"
                      })
                      measurements.append(r)
          artifact = {
              "schema": "ci_runtime_baseline_v1",
              "run_id": os.environ["GH_RUN_ID"],
              "run_attempt": os.environ["GH_RUN_ATTEMPT"],
              "head_sha": os.environ["GH_HEAD_SHA"],
              "merge_sha": os.environ["GH_SHA"],
              "job": os.environ["GH_JOB"],
              "runner_image": os.environ.get("ImageOS","unknown") + "/" + os.environ.get("ImageVersion","unknown"),
              "measurement_method": "date_plus3N_ms",
              "measurements": measurements,
          }
          out = pathlib.Path("ci_runtime_baseline_artifacts/ci_runtime_baseline_v1.json")
          out.write_text(json.dumps(artifact, indent=2))
          print(f"Written: {out}")
          PY
      - name: Upload ci-runtime-baseline artifact
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: ci-runtime-baseline-${{ github.job }}-${{ github.run_attempt }}
          path: ci_runtime_baseline_artifacts/
          if-no-files-found: warn
          retention-days: 30
      - name: Output CI runtime summary
        if: ${{ !cancelled() }}
        run: |
          {
            echo "## CI Runtime Baseline: ${{ github.job }}"
            echo ""
            echo "| step_id | elapsed_ms | status |"
            echo "|---|---|---|"
            python3 - <<'PY'
          import json, pathlib
          p = pathlib.Path("measurements.jsonl")
          if p.exists():
              for line in p.read_text().splitlines():
                  line = line.strip()
                  if line:
                      m = json.loads(line)
                      print(f"| {m['step_id']} | {m['elapsed_ms']} | {m['status']} |")
          PY
          } >> "$GITHUB_STEP_SUMMARY"

