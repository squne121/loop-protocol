  e2e:
    if: ${{ github.event.inputs.python_test_bench != 'true' }}
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash
    env:
      PLAYWRIGHT_VERSION: "1.60.0"
    container:
      image: mcr.microsoft.com/playwright@sha256:9bd26ad900bb5e0f4dee75839e957a89ae89c2b7ab1e76050e559790e946b948
      options: --ipc=host
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Enable pnpm via corepack
        run: |
          corepack enable pnpm
          corepack prepare pnpm@11.7.0 --activate
      - name: Install dependencies (timed)
        id: timed-pnpm-install
        run: |
          run_timed() {
            local step_id="$1"; shift
            local start_ms end_ms elapsed_ms status
            start_ms=$(date +%s%3N)
            set +e
            "$@"
            status=$?
            set -e
