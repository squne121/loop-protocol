                  "--ignore=.claude/hooks/tests/test_secret_boundary_contract.py",
                  "--deselect=.claude/hooks/tests/test_generate_session_manifest_from_hook.py::test_wrapper_stdout_is_silent_and_artifact_path_is_overridable",
                  "--deselect=.claude/hooks/tests/test_generate_session_manifest_from_hook.py::test_wrapper_stderr_redacts_posix_windows_and_wsl_paths",
                  ".claude/skills/issue-contract-review/scripts/tests/",
                  ".claude/skills/issue-contract-review/tests/",
                  ".claude/skills/pr-review-judge/scripts/tests/",
                  ".claude/skills/open-pr/scripts/tests/",
                  ".claude/skills/impl-review-loop/tests/",
                  ".claude/skills/review-issue/tests/",
                  ".claude/skills/issue-refinement-loop/tests/",
                  "tests/context_mode/",
                  "tests/test_summarize_agent_transcript.py",
              ],
              pr_head_sha="${{ github.event.pull_request.head.sha || github.sha }}",
              checked_out_sha=None,
              merge_sha="${{ github.sha }}",
              workflow="ci",
              job="python-test",
              ci_run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
          )
          sys.exit(module.generate_artifact(args))
          PY
      - name: Verify ci_test_selection evidence files
        run: |
          test -s ci_test_selection_artifacts/hook_tests_collect_only.txt
          test -s ci_test_selection_artifacts/ci_test_selection_v1.json
      - uses: actions/upload-artifact@v7
        with:
          name: ci_test_selection
          path: ci_test_selection_artifacts/
          if-no-files-found: error
      - name: Collect ci_runtime_baseline_v1 artifact
        if: ${{ !cancelled() }}
        env:
          GH_JOB: ${{ github.job }}
          GH_RUN_ID: ${{ github.run_id }}
          GH_RUN_ATTEMPT: ${{ github.run_attempt }}
          GH_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          GH_SHA: ${{ github.sha }}
        run: |
          mkdir -p ci_runtime_baseline_artifacts
          python3 - <<'PY'
          import json, os, pathlib
          measurements = []
          p = pathlib.Path("measurements.jsonl")
          if p.exists():
              for line in p.read_text().splitlines():
                  line = line.strip()
                  if line:
                      r = json.loads(line)
                      r.update({
                          "run_id": os.environ["GH_RUN_ID"],
                          "run_attempt": os.environ["GH_RUN_ATTEMPT"],
                          "head_sha": os.environ["GH_HEAD_SHA"],
                          "merge_sha": os.environ["GH_SHA"],
                          "job": os.environ["GH_JOB"],
                          "runner_image": os.environ.get("ImageOS","unknown") + "/" + os.environ.get("ImageVersion","unknown"),
                          "measurement_method": "date_plus3N_ms"
                      })
                      measurements.append(r)
          artifact = {
              "schema": "ci_runtime_baseline_v1",
              "run_id": os.environ["GH_RUN_ID"],
              "run_attempt": os.environ["GH_RUN_ATTEMPT"],
              "head_sha": os.environ["GH_HEAD_SHA"],
              "merge_sha": os.environ["GH_SHA"],
              "job": os.environ["GH_JOB"],
              "runner_image": os.environ.get("ImageOS","unknown") + "/" + os.environ.get("ImageVersion","unknown"),
              "measurement_method": "date_plus3N_ms",
              "measurements": measurements,
          }
          out = pathlib.Path("ci_runtime_baseline_artifacts/ci_runtime_baseline_v1.json")
          out.write_text(json.dumps(artifact, indent=2))
          print(f"Written: {out}")
          PY
      - name: Upload ci-runtime-baseline artifact
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: ci-runtime-baseline-${{ github.job }}-${{ github.run_attempt }}
          path: ci_runtime_baseline_artifacts/
          if-no-files-found: warn
          retention-days: 30
      - name: Output CI runtime summary
        if: ${{ !cancelled() }}
        run: |
          {
            echo "## CI Runtime Baseline: ${{ github.job }}"
            echo ""
            echo "| step_id | elapsed_ms | status |"
            echo "|---|---|---|"
            python3 - <<'PY'
          import json, pathlib
          p = pathlib.Path("measurements.jsonl")
          if p.exists():
              for line in p.read_text().splitlines():
                  line = line.strip()
                  if line:
                      m = json.loads(line)
                      print(f"| {m['step_id']} | {m['elapsed_ms']} | {m['status']} |")
          PY
          } >> "$GITHUB_STEP_SUMMARY"

