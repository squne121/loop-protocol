name: check-hook-integrity

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: check-hook-integrity-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-hook-integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.11.29"

      - name: Test hook integrity checker
        run: uv run --locked pytest .claude/hooks/tests/test_check_hook_integrity.py -q

      - name: Check configured hooks
        run: uv run --locked python3 .claude/hooks/check_hook_integrity.py --format json
