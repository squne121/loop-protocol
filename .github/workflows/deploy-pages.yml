name: deploy-pages

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: read

jobs:
  deploy-main:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    concurrency:
      group: deploy-pages-gh-pages
      cancel-in-progress: false
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: true
          fetch-depth: 0
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: pnpm
      # Issue #1527: deploy-main uv/python provisioning parity — pnpm test
      # (below) exercises the Codex scope-rollup capture Vitest suite, which
      # spawns a Python producer via `uv`/a fixed interpreter. Without this
      # provisioning step, deploy-main only "passes" by accident if the
      # runner image happens to already have a compatible uv/Python
      # available — mirror deploy-pr's provisioning so this job is
      # reproducible rather than incidentally green.
      - uses: ./.github/actions/setup-python-uv
      - name: Assert resolved pnpm version matches packageManager
        shell: bash
        run: |
          set -euo pipefail
          # shellcheck disable=SC2016 # single-quoted: this is a JS template
          # literal for `node -e`, not a shell expansion.
          expected_pnpm_version="$(
            node -e '
              const value = require("./package.json").packageManager;
              const match = /^pnpm@(\d+\.\d+\.\d+)$/.exec(value ?? "");
              if (!match) {
                console.error(`invalid packageManager: ${value}`);
                process.exit(1);
              }
              process.stdout.write(match[1]);
            '
          )"
          actual_pnpm_version="$(pnpm --version)"
          if [ "$actual_pnpm_version" != "$expected_pnpm_version" ]; then
            echo "ERROR: resolved pnpm version ($actual_pnpm_version) does not match expected packageManager pin ($expected_pnpm_version)" >&2
            exit 1
          fi
          echo "OK: resolved pnpm version matches expected $expected_pnpm_version"
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      # Issue #1527: deploy-main uv/python provisioning parity
      - name: Install Python runtime for scope-rollup capture
        run: uv python install
      # Issue #1527: deploy-main uv/python provisioning parity
      - name: Sync locked Python development dependencies for scope-rollup capture
        run: uv sync --locked --group dev
      - run: pnpm test
      - name: Resolve Vite base path
        id: vite-base
        shell: bash
        run: |
          set -euo pipefail
          repo_name="${GITHUB_REPOSITORY#*/}"
          base="/${repo_name}/"
          case "$base" in
            /*/) ;;
            *) echo "Invalid Vite base: $base" >&2; exit 1 ;;
          esac
          echo "VITE_BASE_PATH=$base" >> "$GITHUB_ENV"
          echo "PAGES_BASE_PATH=$base" >> "$GITHUB_ENV"
          echo "base=$base" >> "$GITHUB_OUTPUT"
      - name: Resolve and inject commit SHA
        id: commit-sha
        shell: bash
        run: |
          set -euo pipefail
          sha=$(git rev-parse --verify "HEAD^{commit}")
          if [[ ! "$sha" =~ ^[0-9a-f]{40}$ ]]; then
            echo "ERROR: invalid commit SHA: $sha" >&2
            exit 1
          fi
          printf 'VITE_LOOP_COMMIT_SHA=%s\n' "$sha" >> "$GITHUB_ENV"
          printf 'sha=%s\n' "$sha" >> "$GITHUB_OUTPUT"
      - run: pnpm build
        env:
          VITE_LOOP_COMMIT_SHA: ${{ steps.commit-sha.outputs.sha }}
          VITE_LOOP_RUN_ID: ${{ github.run_id }}
          VITE_LOOP_RUN_ATTEMPT: ${{ github.run_attempt }}
          VITE_LOOP_PAGE_URL: https://${{ github.repository_owner }}.github.io${{ steps.vite-base.outputs.base }}
          VITE_LOOP_ARTIFACT_URL: "unknown"
          VITE_LOOP_ARTIFACT_NAMES: gh-pages-main
          VITE_LOOP_ARTIFACT_DIGEST_OR_ATTESTATION: "unavailable-in-deploy-pages"
          VITE_LOOP_RETENTION_DAYS: "90"
          VITE_LOOP_SCREENSHOT_PATH: "manual_capture_required"
      - name: Verify main build asset base path
        shell: bash
        run: |
          set -euo pipefail
          base="${{ steps.vite-base.outputs.base }}"
          grep -F "${base}assets/" dist/index.html
          if grep -qE 'src="/assets/|href="/assets/' dist/index.html; then exit 1; fi
      - name: Verify commit SHA in dist
        shell: bash
        run: |
          set -euo pipefail
          expected_sha="${{ steps.commit-sha.outputs.sha }}"
          if ! grep -rq "$expected_sha" dist/; then
            echo "ERROR: commit SHA $expected_sha not found in dist/" >&2
            exit 1
          fi
          echo "OK: commit SHA $expected_sha found in dist/"
      - name: Deploy to gh-pages (replace root, preserve pr-*)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Check if gh-pages branch exists
          if git ls-remote --exit-code origin gh-pages; then
            git fetch origin gh-pages
            git worktree add /tmp/gh-pages origin/gh-pages
          else
            # Create orphan gh-pages branch
            git worktree add --orphan -b gh-pages /tmp/gh-pages
          fi

          # Sync dist/ to gh-pages root, deleting stale root files but preserving pr-* dirs
          rsync -a --delete \
            --exclude '.git' \
            --exclude 'pr-*' \
            dist/ /tmp/gh-pages/

          cd /tmp/gh-pages
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to deploy."
          else
            git commit -m "chore: deploy main to gh-pages"
            git push origin HEAD:gh-pages
          fi
      # B2 (#987): build-after provenance (artifact url/digest/retention) is NOT
      # knowable at bundle build time. Upload the dist as a named artifact so the
      # artifact-url / artifact-digest outputs become available, then emit them
      # into playtest-evidence-provenance.json (kept OUT of the bundle).
      - name: Upload dist bundle artifact
        id: upload-dist
        uses: actions/upload-artifact@v7
        with:
          name: gh-pages-main-dist
          path: dist/
          if-no-files-found: error
          retention-days: 90
      - name: Generate playtest-evidence-provenance.json
        env:
          ARTIFACT_URL: ${{ steps.upload-dist.outputs.artifact-url }}
          ARTIFACT_DIGEST: ${{ steps.upload-dist.outputs.artifact-digest }}
          PAGE_URL: https://${{ github.repository_owner }}.github.io${{ steps.vite-base.outputs.base }}
          COMMIT_SHA: ${{ steps.commit-sha.outputs.sha }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
        shell: bash
        run: |
          set -euo pipefail
          fulfilled_or_unknown() {
            if [ -n "${1:-}" ]; then printf '%s' "$1"; else printf 'unknown'; fi
          }
          reason_for() {
            if [ -n "${1:-}" ]; then printf 'available'; else printf 'unknown'; fi
          }
          mkdir -p provenance_artifacts
          cat > provenance_artifacts/playtest-evidence-provenance.json <<JSON
          {
            "schema": "playtest_evidence_provenance/v1",
            "commit_sha": { "value": "$(fulfilled_or_unknown "$COMMIT_SHA")", "availability_reason": "$(reason_for "$COMMIT_SHA")" },
            "run_id": { "value": "$(fulfilled_or_unknown "$RUN_ID")", "availability_reason": "$(reason_for "$RUN_ID")" },
            "run_attempt": { "value": "$(fulfilled_or_unknown "$RUN_ATTEMPT")", "availability_reason": "$(reason_for "$RUN_ATTEMPT")" },
            "page_url": { "value": "$(fulfilled_or_unknown "$PAGE_URL")", "availability_reason": "$(reason_for "$PAGE_URL")" },
            "artifact_url": { "value": "$(fulfilled_or_unknown "$ARTIFACT_URL")", "availability_reason": "$(reason_for "$ARTIFACT_URL")" },
            "artifact_digest_or_attestation": { "value": "$(fulfilled_or_unknown "$ARTIFACT_DIGEST")", "availability_reason": "$(reason_for "$ARTIFACT_DIGEST")" },
            "retention_days": { "value": "90", "availability_reason": "available" }
          }
          JSON
          cat provenance_artifacts/playtest-evidence-provenance.json
      - name: Upload playtest-evidence-provenance artifact
        uses: actions/upload-artifact@v7
        with:
          name: playtest-evidence-provenance
          path: provenance_artifacts/
          if-no-files-found: error
          retention-days: 90

  deploy-pr:
    if: >-
      github.event_name == 'pull_request' &&
      github.event.action != 'closed' &&
      github.event.pull_request.head.repo.full_name == github.repository
    concurrency:
      group: deploy-pages-gh-pages
      cancel-in-progress: false
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: pnpm
      - uses: ./.github/actions/setup-python-uv
      - name: Assert resolved pnpm version matches packageManager
        shell: bash
        run: |
          set -euo pipefail
          # shellcheck disable=SC2016 # single-quoted: this is a JS template
          # literal for `node -e`, not a shell expansion.
          expected_pnpm_version="$(
            node -e '
              const value = require("./package.json").packageManager;
              const match = /^pnpm@(\d+\.\d+\.\d+)$/.exec(value ?? "");
              if (!match) {
                console.error(`invalid packageManager: ${value}`);
                process.exit(1);
              }
              process.stdout.write(match[1]);
            '
          )"
          actual_pnpm_version="$(pnpm --version)"
          if [ "$actual_pnpm_version" != "$expected_pnpm_version" ]; then
            echo "ERROR: resolved pnpm version ($actual_pnpm_version) does not match expected packageManager pin ($expected_pnpm_version)" >&2
            exit 1
          fi
          echo "OK: resolved pnpm version matches expected $expected_pnpm_version"
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - name: Install Python runtime for scope-rollup capture
        run: uv python install
      - name: Sync locked Python development dependencies for scope-rollup capture
        run: uv sync --locked --group dev
      - run: pnpm test
      - name: Resolve Vite base path
        id: vite-base
        shell: bash
        run: |
          set -euo pipefail
          repo_name="${GITHUB_REPOSITORY#*/}"
          base="/${repo_name}/pr-${{ github.event.number }}/"
          case "$base" in
            /*/) ;;
            *) echo "Invalid Vite base: $base" >&2; exit 1 ;;
          esac
          echo "VITE_BASE_PATH=$base" >> "$GITHUB_ENV"
          echo "PAGES_BASE_PATH=$base" >> "$GITHUB_ENV"
          echo "base=$base" >> "$GITHUB_OUTPUT"
      - name: Resolve and inject commit SHA
        id: commit-sha
        shell: bash
        run: |
          set -euo pipefail
          sha=$(git rev-parse --verify "HEAD^{commit}")
          if [[ ! "$sha" =~ ^[0-9a-f]{40}$ ]]; then
            echo "ERROR: invalid commit SHA: $sha" >&2
            exit 1
          fi
          printf 'VITE_LOOP_COMMIT_SHA=%s\n' "$sha" >> "$GITHUB_ENV"
          printf 'sha=%s\n' "$sha" >> "$GITHUB_OUTPUT"
      - name: Resolve PR preview storage namespace
        id: storage-namespace
        shell: bash
        run: |
          set -euo pipefail
          namespace="pr-${{ github.event.number }}"
          case "$namespace" in
            pr-[0-9]*) ;;
            *) echo "Invalid preview storage namespace: $namespace" >&2; exit 1 ;;
          esac
          echo "VITE_LOOP_STORAGE_NAMESPACE=$namespace" >> "$GITHUB_ENV"
          echo "namespace=$namespace" >> "$GITHUB_OUTPUT"
      - run: pnpm build
        env:
          VITE_LOOP_COMMIT_SHA: ${{ steps.commit-sha.outputs.sha }}
          VITE_LOOP_STORAGE_NAMESPACE: ${{ steps.storage-namespace.outputs.namespace }}
          VITE_LOOP_RUN_ID: ${{ github.run_id }}
          VITE_LOOP_RUN_ATTEMPT: ${{ github.run_attempt }}
          VITE_LOOP_PAGE_URL: https://${{ github.repository_owner }}.github.io${{ steps.vite-base.outputs.base }}
          VITE_LOOP_ARTIFACT_URL: "unknown"
          VITE_LOOP_ARTIFACT_NAMES: gh-pages-pr-${{ github.event.number }}-dist,playtest-evidence-provenance-pr-${{ github.event.number }}
          VITE_LOOP_ARTIFACT_DIGEST_OR_ATTESTATION: "unavailable-in-deploy-pages"
          VITE_LOOP_RETENTION_DAYS: "90"
          VITE_LOOP_SCREENSHOT_PATH: "manual_capture_required"
      - name: Verify PR preview build asset base path
        shell: bash
        run: |
          set -euo pipefail
          base="${{ steps.vite-base.outputs.base }}"
          grep -F "${base}assets/" dist/index.html
          if grep -qE 'src="/assets/|href="/assets/' dist/index.html; then exit 1; fi
      - name: Verify preview storage namespace in dist
        shell: bash
        run: |
          set -euo pipefail
          expected_prefix='loop-protocol.preview.'
          expected_namespace="pr-${{ github.event.number }}"
          expected_suffix='.mvp.save'
          if ! grep -rq "$expected_prefix" dist/; then
            echo "ERROR: preview storage prefix $expected_prefix not found in dist/" >&2
            exit 1
          fi
          if ! grep -rq "$expected_namespace" dist/; then
            echo "ERROR: preview storage namespace $expected_namespace not found in dist/" >&2
            exit 1
          fi
          if ! grep -rq "$expected_suffix" dist/; then
            echo "ERROR: preview storage suffix $expected_suffix not found in dist/" >&2
            exit 1
          fi
          echo "OK: preview storage namespace components found in dist/"
      - name: Verify commit SHA in dist
        shell: bash
        run: |
          set -euo pipefail
          expected_sha="${{ steps.commit-sha.outputs.sha }}"
          if ! grep -rq "$expected_sha" dist/; then
            echo "ERROR: commit SHA $expected_sha not found in dist/" >&2
            exit 1
          fi
          echo "OK: commit SHA $expected_sha found in dist/"
      - uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          keep_files: true
          destination_dir: pr-${{ github.event.number }}
      # Issue #1184: deploy-pr dist bundle artifact and provenance JSON,
      # mirroring the deploy-main pattern (B2 / #987) so PR preview builds have
      # the same reproducibility trail as main deploys. Build-after values
      # (artifact url/digest/retention) are NOT knowable at bundle build time
      # and are therefore emitted into playtest-evidence-provenance.json only
      # (kept OUT of the bundle), not re-injected into VITE_* envs.
      # This provenance JSON is an evidence manifest for playtest/reproducibility
      # trail purposes only; it is NOT a signed artifact attestation (no
      # actions/attest / sigstore signing is performed here).
      - name: Upload PR dist bundle artifact
        id: upload-dist
        uses: actions/upload-artifact@v7
        with:
          name: gh-pages-pr-${{ github.event.number }}-dist
          path: dist/
          if-no-files-found: error
          retention-days: 90
      - name: Generate PR playtest-evidence-provenance.json
        env:
          ARTIFACT_URL: ${{ steps.upload-dist.outputs.artifact-url }}
          ARTIFACT_DIGEST: ${{ steps.upload-dist.outputs.artifact-digest }}
          PAGE_URL: https://${{ github.repository_owner }}.github.io${{ steps.vite-base.outputs.base }}
          COMMIT_SHA: ${{ steps.commit-sha.outputs.sha }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
        shell: bash
        run: |
          set -euo pipefail
          fulfilled_or_unknown() {
            if [ -n "${1:-}" ]; then printf '%s' "$1"; else printf 'unknown'; fi
          }
          reason_for() {
            if [ -n "${1:-}" ]; then printf 'available'; else printf 'unknown'; fi
          }
          mkdir -p provenance_artifacts
          cat > provenance_artifacts/playtest-evidence-provenance.json <<JSON
          {
            "schema": "playtest_evidence_provenance/v1",
            "commit_sha": { "value": "$(fulfilled_or_unknown "$COMMIT_SHA")", "availability_reason": "$(reason_for "$COMMIT_SHA")" },
            "run_id": { "value": "$(fulfilled_or_unknown "$RUN_ID")", "availability_reason": "$(reason_for "$RUN_ID")" },
            "run_attempt": { "value": "$(fulfilled_or_unknown "$RUN_ATTEMPT")", "availability_reason": "$(reason_for "$RUN_ATTEMPT")" },
            "page_url": { "value": "$(fulfilled_or_unknown "$PAGE_URL")", "availability_reason": "$(reason_for "$PAGE_URL")" },
            "artifact_url": { "value": "$(fulfilled_or_unknown "$ARTIFACT_URL")", "availability_reason": "$(reason_for "$ARTIFACT_URL")" },
            "artifact_digest_or_attestation": { "value": "$(fulfilled_or_unknown "$ARTIFACT_DIGEST")", "availability_reason": "$(reason_for "$ARTIFACT_DIGEST")" },
            "retention_days": { "value": "90", "availability_reason": "available" }
          }
          JSON
          cat provenance_artifacts/playtest-evidence-provenance.json
          jq -e '
            .schema == "playtest_evidence_provenance/v1"
            and (.commit_sha.value | test("^[0-9a-f]{40}$") or . == "unknown")
            and (.run_id.value | test("^[0-9]+$") or . == "unknown")
            and (.run_attempt.value | test("^[0-9]+$") or . == "unknown")
            and (.page_url.value | startswith("https://") or . == "unknown")
            and (.artifact_url.value | startswith("https://") or . == "unknown")
            and (.artifact_digest_or_attestation.value | test("^[0-9a-f]{64}$") or . == "unknown")
            and .retention_days.value == "90"
          ' provenance_artifacts/playtest-evidence-provenance.json
      - name: Upload PR playtest-evidence-provenance artifact
        uses: actions/upload-artifact@v7
        with:
          name: playtest-evidence-provenance-pr-${{ github.event.number }}
          path: provenance_artifacts/
          if-no-files-found: error
          retention-days: 90
      # Issue #1184: docs-only PR runtime verification note. This comment is a
      # review/evidence-claim memo only. It does NOT introduce a path filter or
      # skip condition for deploy-pr, and does NOT weaken the live asset hard
      # gate below. For docs-only PRs the review layer may record
      # runtime_distribution_verification: not_applicable when explaining why a
      # live-asset click-through is unnecessary, but deploy-pr itself always
      # runs the live asset check as a hard gate for every PR.
      - name: Verify preview assets are live
        id: preview-assets-live
        timeout-minutes: 7
        shell: bash
        run: |
          set -euo pipefail

          # fetch_pages_url_with_bounded_retry polls a GitHub Pages preview
          # URL until it responds 200 OK, or until the shared overall_deadline
          # (set once below, before the first call) is reached. The index
          # page and every discovered asset share this single overall
          # deadline instead of each URL getting its own independent 180s
          # budget -- this prevents per-URL deadlines from stacking into a
          # much longer worst-case wall time than intended when there are
          # multiple assets (Issue #1357).
          #
          # overall_deadline is a hard wall-clock deadline: both the per-curl
          # --max-time and the inter-attempt sleep are capped to the
          # remaining budget so that a slow/hanging curl call or a long
          # backoff sleep cannot push the total runtime past
          # overall_deadline. If no time remains before issuing a request,
          # fail fast instead of calling curl.
          #
          # Retry backoff uses an exponential delay bounded between
          # initial_delay and max_delay (attempt-based), replacing the
          # previous fixed 5-second sleep.
          #
          # Structured log line format (one line per attempt, written to
          # stderr): "label=preview-index|preview-asset attempt=<n>
          # elapsed=<s>s status=<code> action=<live|retry|fail-fast|
          # deadline-exceeded> [next_sleep=<s>s]"
          fetch_pages_url_with_bounded_retry() {
            local label="$1"
            local url="$2"
            local output="$3"
            local initial_delay=2
            local max_delay=20
            local curl_max_time=20
            local attempt=0
            local status="000"
            local tag

            case "$label" in
              preview-index) tag="label=preview-index" ;;
              preview-asset) tag="label=preview-asset" ;;
              *) tag="label=${label}" ;;
            esac

            while :; do
              attempt=$((attempt + 1))
              local elapsed=$SECONDS
              local remaining=$((overall_deadline - SECONDS))

              if (( remaining <= 0 )); then
                echo "ERROR: overall deadline already exceeded before request: $url" >&2
                echo "${tag} attempt=${attempt} elapsed=${elapsed}s status=${status} action=deadline-exceeded" >&2
                return 1
              fi

              local attempt_max_time=$curl_max_time
              if (( remaining < attempt_max_time )); then
                attempt_max_time=$remaining
              fi

              rm -f "${output}.tmp"
              status="$(
                curl -sS -L \
                  -H 'Cache-Control: no-cache' \
                  --max-time "$attempt_max_time" \
                  -o "${output}.tmp" \
                  -w '%{http_code}' \
                  "$url" || true
              )"

              if [ "$status" = "200" ]; then
                mv "${output}.tmp" "$output"
                echo "${tag} attempt=${attempt} elapsed=${elapsed}s status=200 action=live" >&2
                return 0
              fi

              if (( SECONDS >= overall_deadline )); then
                echo "ERROR: URL did not become live before overall deadline: $url" >&2
                echo "${tag} attempt=${attempt} elapsed=${elapsed}s status=${status} action=deadline-exceeded" >&2
                if [ -s "${output}.tmp" ]; then
                  head -c 800 "${output}.tmp" >&2
                fi
                return 1
              fi

              case "$status" in
                # Retry-eligible statuses. Only 404 has been observed in
                # practice for this issue (Issue #1357: GitHub Pages preview
                # subdirectory publish lag before the file becomes servable).
                # The remaining codes below are defensive retries against
                # possible transient Pages/CDN behavior only. They are not
                # observed for #1357 and are not treated as a documented
                # GitHub Pages readiness contract -- they are kept purely as
                # a conservative safety margin:
                #   000 - curl-level connect/reset failure before any HTTP
                #         status was returned (defensive, unobserved here).
                #   403 - Pages CDN can return a spurious forbidden response
                #         while a deployment is still propagating
                #         (defensive, unobserved here).
                #   404 - Pages publish lag before the file is served
                #         (OBSERVED for this issue).
                #   408 - request timeout (defensive, unobserved here).
                #   409 - Pages deployment conflict while a concurrent
                #         publish is in flight (defensive, unobserved here).
                #   425 - too early; origin not yet ready to process the
                #         request. Not a documented Pages-readiness signal,
                #         kept as a defensive retry only (unobserved here).
                #   429 - rate limited (defensive, unobserved here).
                #   500/502/503/504/522/524 - origin or edge unavailable /
                #         timed out while the deployment propagates
                #         (defensive, unobserved here).
                # 400/401 and any other status are treated as non-retriable
                # and fail fast below.
                000|403|404|408|409|425|429|500|502|503|504|522|524)
                  local next_sleep=$((initial_delay * (2 ** (attempt - 1))))
                  if (( next_sleep > max_delay )); then
                    next_sleep=$max_delay
                  fi
                  remaining=$((overall_deadline - SECONDS))
                  if (( remaining <= 0 )); then
                    echo "ERROR: overall deadline exceeded before retry sleep: $url" >&2
                    echo "${tag} attempt=${attempt} elapsed=${elapsed}s status=${status} action=deadline-exceeded" >&2
                    return 1
                  fi
                  if (( next_sleep > remaining )); then
                    next_sleep=$remaining
                  fi
                  echo "${tag} attempt=${attempt} elapsed=${elapsed}s status=${status} action=retry next_sleep=${next_sleep}s" >&2
                  sleep "$next_sleep"
                  ;;
                *)
                  echo "ERROR: non-retriable HTTP status $status for $url" >&2
                  echo "${tag} attempt=${attempt} elapsed=${elapsed}s status=${status} action=fail-fast" >&2
                  return 1
                  ;;
              esac
            done
          }

          overall_deadline=$((SECONDS + 300))

          base="${{ steps.vite-base.outputs.base }}"
          preview_url="https://${GITHUB_REPOSITORY_OWNER}.github.io${base}"
          fetch_pages_url_with_bounded_retry "preview-index" "${preview_url}?cache_bust=${GITHUB_SHA}" /tmp/preview-index.html
          grep -F "${base}assets/" /tmp/preview-index.html
          if grep -qE 'src="/assets/|href="/assets/' /tmp/preview-index.html; then exit 1; fi
          mapfile -t asset_paths < <(grep -oE '(src|href)="[^"]+assets/[^"]+"' /tmp/preview-index.html | sed -E 's/^[^"]+"([^"]+)"/\1/' | sort -u)
          if [ "${#asset_paths[@]}" -eq 0 ]; then
            echo "No asset paths found in /tmp/preview-index.html" >&2
            exit 1
          fi
          for asset_path in "${asset_paths[@]}"; do
            case "$asset_path" in
              "$base"assets/*) ;;
              *)
                echo "Unexpected asset path outside expected base: $asset_path" >&2
                exit 1
                ;;
            esac
            fetch_pages_url_with_bounded_retry "preview-asset" "https://${GITHUB_REPOSITORY_OWNER}.github.io${asset_path}?cache_bust=${GITHUB_SHA}" /tmp/preview-asset.bin
          done
      - name: Install Playwright browser for preview smoke
        run: pnpm exec playwright install --with-deps chromium
      - name: Verify preview playability (direct + iframe)
        env:
          PREVIEW_URL: https://${{ github.repository_owner }}.github.io${{ steps.vite-base.outputs.base }}
        run: |
          set -euo pipefail
          pnpm exec node scripts/ci/preview_playability_smoke.mjs \
            --url "$PREVIEW_URL" \
            --output-dir artifacts/preview-playability-smoke
      - name: Upload preview playability smoke artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: preview-playability-smoke-pr-${{ github.event.number }}
          path: artifacts/preview-playability-smoke/
          if-no-files-found: error
          retention-days: 90
      - name: Comment preview URL on PR
        if: ${{ always() }}
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          PAGES_BASE_PATH: ${{ steps.vite-base.outputs.base }}
          PREVIEW_ASSET_LIVE_STATUS: ${{ steps.preview-assets-live.outcome }}
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const basePath = process.env.PAGES_BASE_PATH;
            const previewUrl = `https://${context.repo.owner}.github.io${basePath}`;
            const assetLivePassed = process.env.PREVIEW_ASSET_LIVE_STATUS === 'success';

            const marker = '<!-- loop-protocol-pr-preview -->';
            const closingNote = 'The preview will be removed when this PR is closed.';
            const body = assetLivePassed
              ? [marker, '## Preview URL', '', `✅ verified live assets: ${previewUrl}`, '', closingNote].join('\n')
              : [marker, '## Preview URL', '', `⏳ publish requested（asset-level live check 未検証 / Pages source 設定後に有効化）: ${previewUrl}`, '', 'Pages source の設定が必要な場合: Settings → Pages → Source → gh-pages (root)', 'base path 修正だけでは hosted runtime 復旧を保証しません。publish trigger / source fault は別問題として切り分けてください。', closingNote].join('\n');

            const allComments = await github.paginate(
              github.rest.issues.listComments,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
              }
            );
            const existing = allComments.find(
              c => c.user.login === 'github-actions[bot]' && c.body.includes(marker)
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }

  cleanup-pr:
    if: >-
      github.event_name == 'pull_request' &&
      github.event.action == 'closed' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.actor != 'dependabot[bot]'
    concurrency:
      group: deploy-pages-gh-pages
      cancel-in-progress: false
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Check if gh-pages branch exists
        id: check-branch
        run: |
          if git ls-remote --exit-code origin gh-pages; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        if: steps.check-branch.outputs.exists == 'true'
        with:
          ref: gh-pages
          persist-credentials: true
      - name: Remove PR preview directory
        if: steps.check-branch.outputs.exists == 'true'
        run: |
          PR_DIR="pr-${{ github.event.number }}"
          if [ -d "$PR_DIR" ]; then
            git rm -rf "$PR_DIR"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "chore: remove preview for PR #${{ github.event.number }}"
            git push
          else
            echo "Directory $PR_DIR not found, nothing to clean up."
          fi
      - name: Skip cleanup (gh-pages branch not found)
        if: steps.check-branch.outputs.exists == 'false'
        run: echo "gh-pages branch does not exist yet; no-op cleanup."
      - name: Update preview URL comment to "Preview removed"
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const marker = '<!-- loop-protocol-pr-preview -->';

            // Fetch all comments with pagination
            const allComments = await github.paginate(
              github.rest.issues.listComments,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                per_page: 100,
              }
            );

            // Find the bot preview comment (must be from github-actions[bot] and contain the marker)
            const target = allComments.find(
              c => c.user.login === 'github-actions[bot]' && c.body.includes(marker)
            );

            if (target) {
              // Update to "Preview removed" — do not delete (preserves playtest trail)
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: target.id,
                body: `${marker}\n## Preview URL\n\nPreview removed (PR #${prNumber} closed).`,
              });
            }
            // No-op if no matching comment found — do not create a new comment
