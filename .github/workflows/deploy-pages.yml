name: deploy-pages

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write
  pull-requests: write

jobs:
  deploy-main:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    concurrency:
      group: deploy-pages-gh-pages
      cancel-in-progress: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v6
        with:
          version: 11
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build -- --base=/loop-protocol/
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          keep_files: true

  deploy-pr:
    if: >-
      github.event_name == 'pull_request' &&
      github.event.action != 'closed' &&
      github.event.pull_request.head.repo.full_name == github.repository
    concurrency:
      group: deploy-pages-gh-pages
      cancel-in-progress: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v6
        with:
          version: 11
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build -- --base=/loop-protocol/pr-${{ github.event.number }}/
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          keep_files: true
          destination_dir: pr-${{ github.event.number }}
      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const previewUrl = `https://squne121.github.io/loop-protocol/pr-${prNumber}/`;

            // Live check: verify the preview URL is actually reachable (best-effort)
            let liveCheckPassed = false;
            try {
              const { execSync } = require('child_process');
              execSync(
                `curl -fsSL --retry 5 --retry-delay 10 --max-time 90 -o /dev/null -w "%{http_code}" "${previewUrl}" | grep -q "^200$"`,
                { stdio: 'inherit' }
              );
              liveCheckPassed = true;
            } catch (_) {
              // best-effort: live check failed, but do not fail the workflow
            }

            const body = liveCheckPassed
              ? `<!-- loop-protocol-pr-preview -->\n## Preview URL\n\nThis PR is deployed to: ${previewUrl}\n\n> The preview will be removed when this PR is closed.`
              : `<!-- loop-protocol-pr-preview -->\n## Preview URL\n\nPreview publish requested; live URL not yet verified (${previewUrl})\n\n> Pages source setting may be required. See Settings → Pages → Source → gh-pages (root).\n> The preview will be removed when this PR is closed.`;

            // Upsert: update existing bot comment if present, otherwise create
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });
            const marker = '<!-- loop-protocol-pr-preview -->';
            const existing = comments.find(
              c => c.user.type === 'Bot' && c.body.includes(marker)
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }

  cleanup-pr:
    if: >-
      github.event_name == 'pull_request' &&
      github.event.action == 'closed'
    concurrency:
      group: deploy-pages-gh-pages
      cancel-in-progress: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: gh-pages
          persist-credentials: true
      - name: Remove PR preview directory
        run: |
          PR_DIR="pr-${{ github.event.number }}"
          if [ -d "$PR_DIR" ]; then
            git rm -rf "$PR_DIR"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "chore: remove preview for PR #${{ github.event.number }}"
            git push
          else
            echo "Directory $PR_DIR not found, nothing to clean up."
          fi
