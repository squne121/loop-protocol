name: agent-retro-index

on:
  workflow_dispatch:
    inputs:
      parent_issue:
        description: Parent issue number for the canonical retro index marker
        type: number
        required: true
        default: 928
      dry_run:
        description: Keep the workflow in dry-run mode
        type: boolean
        required: true
        default: true
  push:
    branches:
      - main
    paths:
      - scripts/agent-logs/update-retro-index.mjs
      - scripts/agent-logs/lib/retro-index*.mjs
      - scripts/lib/agent-run-report-validation.mjs
      - docs/schemas/agent-retro-index.schema.json
      - tests/agent-logs/retro-index*.test.ts
      - tests/fixtures/agent-retro-index/**
      - package.json
      - pnpm-lock.yaml
      - .github/workflows/agent-retro-index.yml
  # Read-only bootstrap smoke trigger only (Issue #1476 P1-3). The write jobs
  # (build-index / upsert-parent-comment) below are explicitly gated to skip
  # pull_request; only bootstrap-smoke runs here, so a PR touching this
  # file's pnpm bootstrap is actually exercised by CI instead of relying on
  # static tests alone.
  pull_request:
    paths:
      - package.json
      - pnpm-lock.yaml
      - .github/workflows/agent-retro-index.yml

permissions: {}

jobs:
  build-index:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
      pull-requests: read
    outputs:
      dry_run: ${{ steps.mode.outputs.dry_run }}
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Determine dry-run mode
        id: mode
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            printf 'dry_run=%s\n' "${{ inputs.dry_run }}" >> "$GITHUB_OUTPUT"
          else
            printf 'dry_run=false\n' >> "$GITHUB_OUTPUT"
          fi

      - name: Build retro index artifact
        run: |
          node scripts/agent-logs/update-retro-index.mjs \
            --repo squne121/loop-protocol \
            --parent-issue "${{ inputs.parent_issue || '928' }}" \
            --dry-run true \
            --artifact-json-out artifacts/agent-retro-index.json \
            --source-set-json-out artifacts/agent-retro-index-source-set.json \
            --summary-json-out artifacts/agent-retro-index-summary.json

      - name: Validate retro index artifact
        run: pnpm agent-retro-index:check artifacts/agent-retro-index.json

      - name: Verify artifact digest metadata
        run: pnpm agent-retro-index:verify-digest artifacts/agent-retro-index.json --source-set-json-in artifacts/agent-retro-index-source-set.json --summary-json-in artifacts/agent-retro-index-summary.json

      - name: Upload retro index artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-retro-index
          path: |
            artifacts/agent-retro-index.json
            artifacts/agent-retro-index-source-set.json
            artifacts/agent-retro-index-summary.json

  upsert-parent-comment:
    runs-on: ubuntu-latest
    needs: build-index
    if: github.event_name != 'pull_request' && (github.event_name == 'push' || needs.build-index.outputs.dry_run == 'false')
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download retro index artifact
        uses: actions/download-artifact@v5
        with:
          name: agent-retro-index
          path: artifacts

      - name: Revalidate artifact before write
        run: |
          pnpm agent-retro-index:check artifacts/agent-retro-index.json
          pnpm agent-retro-index:verify-digest artifacts/agent-retro-index.json --source-set-json-in artifacts/agent-retro-index-source-set.json --summary-json-in artifacts/agent-retro-index-summary.json

      - name: Upsert canonical parent marker
        run: |
          node scripts/agent-logs/update-retro-index.mjs \
            --repo squne121/loop-protocol \
            --parent-issue "${{ inputs.parent_issue || '928' }}" \
            --dry-run false \
            --confirm-live true \
            --artifact-json-in artifacts/agent-retro-index.json \
            --source-set-json-in artifacts/agent-retro-index-source-set.json \
            --summary-json-in artifacts/agent-retro-index-summary.json \
            --summary-json-out artifacts/agent-retro-index-live-summary.json

  # Read-only bootstrap-only smoke job (Issue #1476 P1-3). build-index /
  # upsert-parent-comment above never run on pull_request (see the
  # per-job `if:` gates), so this workflow was previously never exercised by
  # this PR's own CI. This job does nothing but checkout + pnpm bootstrap +
  # assert the resolved pnpm version matches package.json#packageManager --
  # no build-index side effects, no write permissions.
  bootstrap-smoke:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Assert resolved pnpm version matches packageManager
        shell: bash
        run: |
          set -euo pipefail
          # shellcheck disable=SC2016 # single-quoted: this is a JS template
          # literal for `node -e`, not a shell expansion.
          expected_pnpm_version="$(
            node -e '
              const value = require("./package.json").packageManager;
              const match = /^pnpm@(\d+\.\d+\.\d+)$/.exec(value ?? "");
              if (!match) {
                console.error(`invalid packageManager: ${value}`);
                process.exit(1);
              }
              process.stdout.write(match[1]);
            '
          )"
          actual_pnpm_version="$(pnpm --version)"
          if [ "$actual_pnpm_version" != "$expected_pnpm_version" ]; then
            echo "ERROR: resolved pnpm version ($actual_pnpm_version) does not match expected packageManager pin ($expected_pnpm_version)" >&2
            exit 1
          fi
          echo "OK: resolved pnpm version matches expected $expected_pnpm_version"
