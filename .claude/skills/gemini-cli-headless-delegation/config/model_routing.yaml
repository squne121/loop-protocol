# model_routing.yaml — optional override for DEFAULT_MODEL_ROUTING in run_gemini_headless.py
#
# When this file exists, its values are deep-merged into DEFAULT_MODEL_ROUTING.
# Keys not listed here fall back to the Python-side defaults.
# Edit model IDs here when stable Gemini model names change — no code change needed.
#
# Schema:
#   default_chain: list[str]          # tried in order when no role / no explicit model
#   roles:
#     <role_name>:
#       model_chain: list[str]        # tried in order for this role
#
# Supported role names (see references/model-routing.md for full table):
#   code_research, web_research, github_research, implementation, issue_authoring
#
# NOTE: model IDs below are placeholders matching DEFAULT_MODEL_ROUTING.
# Replace with verified stable IDs when Gemini releases official aliases.

default_chain:
  - gemini-3-flash-preview
  - gemini-2.5-flash

roles:
  code_research:
    model_chain:
      - gemini-3-flash-preview
      - gemini-2.5-flash
  web_research:
    model_chain:
      - gemini-3-flash-preview
      - gemini-2.5-flash
  github_research:
    model_chain:
      - gemini-3-flash-preview
      - gemini-2.5-flash
  implementation:
    model_chain:
      - gemini-3-pro-preview
      - gemini-3-flash-preview
      - gemini-2.5-flash
  issue_authoring:
    model_chain:
      - gemini-3-pro-preview
      - gemini-3-flash-preview
      - gemini-2.5-flash

# provider_auto_policy_v1 (Issue #1270)
#
# Fixed v1 policy for runtime provider="auto" dispatch in run_gemini_headless.py
# (see provider_auto_dispatch()). This block documents the policy; the
# authoritative enforcement lives in the Python constants of the same name
# (PROVIDER_AUTO_*) in run_gemini_headless.py -- this YAML block is not
# re-parsed at runtime, it exists so the policy is discoverable in docs/config
# per the Issue #1270 Outcome. Keep both in sync when editing either.
#
# setup_check_order (setup_check.py --provider auto) is agy-first and is a
# SEPARATE policy from runtime_order below -- see references/model-routing.md
# for why the two orders intentionally differ.
provider_auto_policy_v1:
  schema_version: v1
  runtime_order:
    - gemini
    - agy
  setup_check_order:
    - agy
    - gemini
  eligible_profiles:
    - no_tools
    - proposal_only
  retryable_failure_classes:
    gemini:
      - quota_or_rate_limited
      - model_capacity_exhausted
      - model_chain_exhausted
    agy:
      - agy_rate_limited
      - agy_capacity_exhausted
      - agy_web_grounding_quota_exhausted
  stop_if:
    - request_validation_failed
    - auth_or_permission_failed
    - request_has_post_to_issue_url
    - provider_profile_unsupported
  result_fields:
    - selected_provider
    - provider_attempts
    - fallback_reason
    - fallback_policy_version
    - attempts_by_model
  idempotency_guard: >-
    Provider fallback stops permanently once any provider attempt for a
    request has reached (or would reach) idempotent post-processing --
    concretely, request.post_to_issue_url is set. No later provider attempt
    is made after that point, even if the attempt that reached
    post-processing failed, to avoid duplicate GitHub comment posts.

# providers.<name>.retry_budget (Issue #1270 AC2)
#
# Provider-scoped retry budget, distinct from roles.<role>.model_chain above.
# model_chain answers "which models, in what order"; retry_budget answers
# "how many attempts / how much backoff per provider" independent of role.
# Validated fail-closed by load_model_routing() -- unknown keys, wrong types,
# and negative attempt/backoff counts raise ValueError.
providers:
  gemini:
    retry_budget:
      same_model_attempts: 3
      same_provider_attempts: 1
      initial_backoff_seconds: 1
      max_backoff_seconds: 4
      jitter: false
      retryable_failure_classes:
        - quota_or_rate_limited
        - model_capacity_exhausted
        - model_chain_exhausted
  agy:
    retry_budget:
      same_model_attempts: 1
      same_provider_attempts: 1
      initial_backoff_seconds: 2
      max_backoff_seconds: 10
      jitter: false
      retryable_failure_classes:
        - agy_rate_limited
        - agy_capacity_exhausted
        - agy_web_grounding_quota_exhausted
