approval_policy = "on-request"
default_permissions = "loop-protocol-rtk"

[permissions.loop-protocol-rtk.filesystem]
":minimal" = "read"

[permissions.loop-protocol-rtk.filesystem.":workspace_roots"]
"." = "write"
"assets" = "read"
"LICENSES" = "read"

[permissions.loop-protocol-rtk.network]
enabled = true

[permissions.loop-protocol-rtk.network.domains]
"github.com" = "allow"
"api.github.com" = "allow"
"objects.githubusercontent.com" = "allow"

[permissions.loop-protocol-bootstrap.filesystem]
":minimal" = "read"

[permissions.loop-protocol-bootstrap.filesystem.":workspace_roots"]
"." = "write"
"assets" = "read"
"LICENSES" = "read"

[permissions.loop-protocol-bootstrap.network]
enabled = true

[permissions.loop-protocol-bootstrap.network.domains]
"github.com" = "allow"
"api.github.com" = "allow"
"objects.githubusercontent.com" = "allow"
"registry.npmjs.org" = "allow"
"*.npmjs.org" = "allow"
