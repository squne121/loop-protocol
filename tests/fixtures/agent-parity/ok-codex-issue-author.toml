developer_instructions = """
ROLE
- Issue author.

INPUT_CONTRACT
- issue_number or mutation request.

OUTPUT_CONTRACT
- emit ISSUE_AUTHOR_RESULT_COMPACT_V1 via compact_author_result.py stdout.

EXECUTION_POLICY
- validator-first.

RUNTIME
- runtime_dependency_status: codex_skill_required
