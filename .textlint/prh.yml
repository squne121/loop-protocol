version: 1
rules:
  # === Prohibited expressions (ambiguous/casual Japanese) ===
  - expected: "（具体的な依頼内容を記載してください）"
    patterns:
      - よしなに

  - expected: "（確実性の高い表現に変えてください）"
    patterns:
      - たぶん

  - expected: "（確実性の高い表現に変えてください）"
    patterns:
      - おそらく

  # === Game domain terms ===
  - expected: sortie
    patterns:
      - ソーティ
      - そーてぃ

  # === Project technical terms ===
  - expected: GitHub
    patterns:
      - Github
      - GITHUB

  - expected: pnpm
    patterns:
      - PNPM
      - Pnpm

  - expected: TypeScript
    patterns:
      - Typescript

  - expected: JavaScript
    patterns:
      - Javascript

  # === LOOP_PROTOCOL domain terms ===
  - expected: VC
    patterns:
      - verification command
      - Verification command

  - expected: AC
    patterns:
      - acceptance criteria
      - Acceptance Criteria

  - expected: Verification Commands
    patterns:
      - verification commands
      - 検証コマンド

  - expected: Safety Claim Matrix
    patterns:
      - safety claim matrix
      - セーフティクレームマトリクス

  - expected: fail-closed
    patterns:
      - fail closed
      - failclose

  - expected: fail-open
    patterns:
      - fail open
      - failopen

  # === VC terminology (VC周辺標準用語) ===
  # trivially-pass -> 自明PASS
  # NOTE: trivially_pass (snake_case) は machine-readable token（enum / YAML key / script / grep pattern）
  #       として使用するため置換対象外。人間向け説明文に現れる trivially-pass (hyphen) のみ対象。
  - expected: 自明PASS
    patterns:
      - /trivially-pass/
    specs:
      - from: trivially-pass
        to: 自明PASS

  # baseline fail -> 変更前FAIL
  # NOTE: standalone "baseline" は文脈依存が強く自動置換対象外。
  #       "baseline fail" / "baseline pass" の複合語のみ対象。
  #       大小文字バリエーション（baseline FAIL / Baseline fail 等）も含む。
  - expected: 変更前FAIL
    patterns:
      - /\b[Bb]aseline [Ff][Aa][Ii][Ll]\b/
    specs:
      - from: baseline fail
        to: 変更前FAIL
      - from: baseline FAIL
        to: 変更前FAIL
      - from: Baseline fail
        to: 変更前FAIL
      - from: baseline failover
        to: baseline failover

  # baseline pass -> 変更前PASS
  - expected: 変更前PASS
    patterns:
      - /\b[Bb]aseline [Pp][Aa][Ss][Ss]\b/
    specs:
      - from: baseline pass
        to: 変更前PASS
      - from: baseline PASS
        to: 変更前PASS
      - from: Baseline pass
        to: 変更前PASS
      - from: baseline passing
        to: baseline passing
  # === AI運用語 post-processing ===
  # 境界ポリシー（boundary-safe specs）:
  #   置換対象は「複合語そのもの」のみ。前後の境界文字 [\w ` -] を不変に保つ。
  #   先頭 group (^|[^\w`-]) で直前の語境界を捕捉して $1 で復元し、
  #   末尾 lookahead (?=$|[^\w`-]) で直後の語境界を消費せず固定する。
  #   これにより以下を誤置換しない:
  #     - hyphen 接続: not-auto-fixable / pre-intake gate
  #     - suffix 接続: auto-fixable-ish
  #     - 複数形: hygiene failures / snapshot freshnesses
  #     - snake_case machine token: intake_gate / snapshot_freshness
  #     - code span（spaced phrase 含む）: `intake gate` / `snapshot freshness`
  #   （textlint は inline code を AST 上スキップするが、code span は negative spec でも二重に固定する）

  # safe auto-fix: auto-fixable -> 自動修正可能
  - expected: $1自動修正可能
    patterns:
      - /(^|[^\w`\-])auto-fixable(?=$|[^\w`\-])/
    specs:
      - from: auto-fixable
        to: 自動修正可能
      - from: not-auto-fixable
        to: not-auto-fixable
      - from: auto-fixable-ish
        to: auto-fixable-ish
      - from: "`auto-fixable`"
        to: "`auto-fixable`"

  # safe auto-fix: hygiene failure -> 体裁不備
  - expected: $1体裁不備
    patterns:
      - /(^|[^\w`\-])hygiene failure(?=$|[^\w`\-])/
    specs:
      - from: hygiene failure
        to: 体裁不備
      - from: hygiene failures
        to: hygiene failures
      - from: "`hygiene failure`"
        to: "`hygiene failure`"

  # contextual auto-fix: intake gate -> 着手前確認
  - expected: $1着手前確認
    patterns:
      - /(^|[^\w`\-])intake gate(?=$|[^\w`\-])/
    specs:
      - from: intake gate
        to: 着手前確認
      - from: pre-intake gate
        to: pre-intake gate
      - from: intake_gate
        to: intake_gate
      - from: "`intake gate`"
        to: "`intake gate`"
      - from: "`intake_gate`"
        to: "`intake_gate`"

  # contextual auto-fix: deterministic fixer SubAgent -> 決定的修正サブエージェント
  - expected: $1決定的修正サブエージェント
    patterns:
      - /(^|[^\w`\-])deterministic fixer SubAgent(?=$|[^\w`\-])/
    specs:
      - from: deterministic fixer SubAgent
        to: 決定的修正サブエージェント
      - from: deterministic_fixer_SubAgent
        to: deterministic_fixer_SubAgent
      - from: "`deterministic fixer SubAgent`"
        to: "`deterministic fixer SubAgent`"
      - from: "`deterministic_fixer_SubAgent`"
        to: "`deterministic_fixer_SubAgent`"

  # contextual auto-fix: snapshot freshness -> スナップショット鮮度
  - expected: $1スナップショット鮮度
    patterns:
      - /(^|[^\w`\-])snapshot freshness(?=$|[^\w`\-])/
    specs:
      - from: snapshot freshness
        to: スナップショット鮮度
      - from: snapshot freshnesses
        to: snapshot freshnesses
      - from: snapshot_freshness
        to: snapshot_freshness
      - from: "`snapshot freshness`"
        to: "`snapshot freshness`"
      - from: "`snapshot_freshness`"
        to: "`snapshot_freshness`"

  # glossary-only / no blanket fix
  # enum / mutation / stale / intake / gate / freshness / snapshot / SubAgent
  # These tokens are documented in docs/dev/glossary.md but intentionally have no blanket prh rule.
