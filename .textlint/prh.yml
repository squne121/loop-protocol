version: 1
rules:
  # === Prohibited expressions (ambiguous/casual Japanese) ===
  - expected: "（具体的な依頼内容を記載してください）"
    patterns:
      - よしなに

  - expected: "（確実性の高い表現に変えてください）"
    patterns:
      - たぶん

  - expected: "（確実性の高い表現に変えてください）"
    patterns:
      - おそらく

  # === Game domain terms ===
  - expected: sortie
    patterns:
      - ソーティ
      - そーてぃ

  # === Project technical terms ===
  - expected: GitHub
    patterns:
      - Github
      - GITHUB

  - expected: pnpm
    patterns:
      - PNPM
      - Pnpm

  - expected: TypeScript
    patterns:
      - Typescript

  - expected: JavaScript
    patterns:
      - Javascript

  # === LOOP_PROTOCOL domain terms ===
  - expected: VC
    patterns:
      - verification command
      - Verification command

  - expected: AC
    patterns:
      - acceptance criteria
      - Acceptance Criteria

  - expected: Verification Commands
    patterns:
      - verification commands
      - 検証コマンド

  - expected: Safety Claim Matrix
    patterns:
      - safety claim matrix
      - セーフティクレームマトリクス

  - expected: fail-closed
    patterns:
      - fail closed
      - failclose

  - expected: fail-open
    patterns:
      - fail open
      - failopen

  # === VC terminology (VC周辺標準用語) ===
  # trivially-pass -> 自明PASS
  # NOTE: trivially_pass (snake_case) は machine-readable token（enum / YAML key / script / grep pattern）
  #       として使用するため置換対象外。人間向け説明文に現れる trivially-pass (hyphen) のみ対象。
  - expected: 自明PASS
    patterns:
      - /trivially-pass/
    specs:
      - from: trivially-pass
        to: 自明PASS

  # baseline fail -> 変更前FAIL
  # NOTE: standalone "baseline" は文脈依存が強く自動置換対象外。
  #       "baseline fail" / "baseline pass" の複合語のみ対象。
  #       大小文字バリエーション（baseline FAIL / Baseline fail 等）も含む。
  - expected: 変更前FAIL
    patterns:
      - /\b[Bb]aseline [Ff][Aa][Ii][Ll]\b/
    specs:
      - from: baseline fail
        to: 変更前FAIL
      - from: baseline FAIL
        to: 変更前FAIL
      - from: Baseline fail
        to: 変更前FAIL
      - from: baseline failover
        to: baseline failover

  # baseline pass -> 変更前PASS
  - expected: 変更前PASS
    patterns:
      - /\b[Bb]aseline [Pp][Aa][Ss][Ss]\b/
    specs:
      - from: baseline pass
        to: 変更前PASS
      - from: baseline PASS
        to: 変更前PASS
      - from: Baseline pass
        to: 変更前PASS
      - from: baseline passing
        to: baseline passing
  # === AI運用語 post-processing ===
  # safe auto-fix
  - expected: 自動修正可能
    patterns:
      - /auto[-]fixable/
    specs:
      - from: auto-fixable
        to: 自動修正可能

  - expected: 体裁不備
    patterns:
      - hygiene failure
    specs:
      - from: hygiene failure
        to: 体裁不備

  # contextual auto-fix
  # intake gate -> 着手前確認
  # NOTE: "intake gate" (spaced, prose) は置換対象。
  #       "intake_gate" (snake_case, machine token) は不変。
  #       "`intake_gate`" (backtick, code span) は不変。
  - expected: 着手前確認
    patterns:
      - /\bintake gate\b/
    specs:
      - from: intake gate
        to: 着手前確認
      - from: intake_gate
        to: intake_gate
      - from: "`intake_gate`"
        to: "`intake_gate`"

  # deterministic fixer SubAgent -> 決定的修正サブエージェント
  # NOTE: "deterministic fixer SubAgent" (spaced, prose) は置換対象。
  #       "deterministic_fixer_SubAgent" (snake_case, machine token) は不変。
  #       "`deterministic_fixer_SubAgent`" (backtick, code span) は不変。
  - expected: 決定的修正サブエージェント
    patterns:
      - /\bdeterministic fixer SubAgent\b/
    specs:
      - from: deterministic fixer SubAgent
        to: 決定的修正サブエージェント
      - from: deterministic_fixer_SubAgent
        to: deterministic_fixer_SubAgent
      - from: "`deterministic_fixer_SubAgent`"
        to: "`deterministic_fixer_SubAgent`"

  # snapshot freshness -> スナップショット鮮度
  # NOTE: "snapshot freshness" (spaced, prose) は置換対象。
  #       "snapshot_freshness" (snake_case, machine token) は不変。
  #       "`snapshot_freshness`" (backtick, code span) は不変。
  - expected: スナップショット鮮度
    patterns:
      - /\bsnapshot freshness\b/
    specs:
      - from: snapshot freshness
        to: スナップショット鮮度
      - from: snapshot_freshness
        to: snapshot_freshness
      - from: "`snapshot_freshness`"
        to: "`snapshot_freshness`"

  # glossary-only / no blanket fix
  # enum / mutation / stale / intake / gate / freshness / snapshot / SubAgent
  # These tokens are documented in docs/dev/glossary.md but intentionally have no blanket prh rule.
