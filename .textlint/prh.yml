version: 1
rules:
  # === Prohibited expressions (ambiguous/casual Japanese) ===
  - expected: "（具体的な依頼内容を記載してください）"
    patterns:
      - よしなに

  - expected: "（確実性の高い表現に変えてください）"
    patterns:
      - たぶん

  - expected: "（確実性の高い表現に変えてください）"
    patterns:
      - おそらく

  # === Game domain terms ===
  - expected: sortie
    patterns:
      - ソーティ
      - そーてぃ

  # === Project technical terms ===
  - expected: GitHub
    patterns:
      - Github
      - GITHUB

  - expected: pnpm
    patterns:
      - PNPM
      - Pnpm

  - expected: TypeScript
    patterns:
      - Typescript

  - expected: JavaScript
    patterns:
      - Javascript

  # === LOOP_PROTOCOL domain terms ===
  - expected: VC
    patterns:
      - verification command
      - Verification command

  - expected: AC
    patterns:
      - acceptance criteria
      - Acceptance Criteria

  - expected: Verification Commands
    patterns:
      - verification commands
      - 検証コマンド

  - expected: Safety Claim Matrix
    patterns:
      - safety claim matrix
      - セーフティクレームマトリクス

  - expected: fail-closed
    patterns:
      - fail closed
      - failclose

  - expected: fail-open
    patterns:
      - fail open
      - failopen

  # === VC terminology (VC周辺標準用語) ===
  # trivially-pass -> 自明PASS
  # NOTE: trivially_pass (snake_case) は machine-readable token（enum / YAML key / script / grep pattern）
  #       として使用するため置換対象外。人間向け説明文に現れる trivially-pass (hyphen) のみ対象。
  - expected: 自明PASS
    patterns:
      - trivially-pass
    specs:
      - from: trivially-pass
        to: 自明PASS

  # baseline fail -> 変更前FAIL
  # NOTE: standalone "baseline" は文脈依存が強く自動置換対象外。
  #       "baseline fail" / "baseline pass" の複合語のみ対象。
  #       大小文字バリエーション（baseline FAIL / Baseline fail 等）も含む。
  - expected: 変更前FAIL
    patterns:
      - /[Bb]aseline [Ff][Aa][Ii][Ll]/
    specs:
      - from: baseline fail
        to: 変更前FAIL
      - from: baseline FAIL
        to: 変更前FAIL
      - from: Baseline fail
        to: 変更前FAIL

  # baseline pass -> 変更前PASS
  - expected: 変更前PASS
    patterns:
      - /[Bb]aseline [Pp][Aa][Ss][Ss]/
    specs:
      - from: baseline pass
        to: 変更前PASS
      - from: baseline PASS
        to: 変更前PASS
      - from: Baseline pass
        to: 変更前PASS
